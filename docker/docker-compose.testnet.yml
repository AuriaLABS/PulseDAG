version: "3.9"
services:
  node-a:
    build:
      context: ..
      dockerfile: docker/Dockerfile.node
    env_file:
      - ../config/testnet/node-a.env
    ports:
      - "8080:8080"
      - "9001:9001"
    volumes:
      - ../data/node-a:/app/data/node-a

  node-b:
    build:
      context: ..
      dockerfile: docker/Dockerfile.node
    env_file:
      - ../config/testnet/node-b.env
    ports:
      - "8081:8081"
      - "9002:9002"
    volumes:
      - ../data/node-b:/app/data/node-b

  node-c:
    build:
      context: ..
      dockerfile: docker/Dockerfile.node
    env_file:
      - ../config/testnet/node-c.env
    ports:
      - "8082:8082"
      - "9003:9003"
    volumes:
      - ../data/node-c:/app/data/node-c
