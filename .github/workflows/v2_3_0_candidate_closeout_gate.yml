name: v2.3.0 candidate closeout gate

on:
  workflow_dispatch:
    inputs:
      candidate_sha:
        description: Exact candidate commit/ref; blank uses the triggering SHA
        required: false
        type: string
      mode:
        description: Runtime closeout requires real operational drills; diagnostic never authorizes closeout
        required: true
        default: runtime-closeout
        type: choice
        options:
          - runtime-closeout
          - diagnostic
      duration_secs:
        description: Mining duration for each staged network gate
        required: false
        default: '600'
        type: string
      quiescence_wait_secs:
        description: Quiescence wait for each staged network gate
        required: false
        default: '180'
        type: string
      min_selected_gap:
        description: Minimum selected-height gap for lag injection
        required: false
        default: '96'
        type: string
      package_test_timeout_minutes:
        description: Maximum runtime for each workspace package test suite
        required: false
        default: '20'
        type: string
      test_threads:
        description: Rust test threads per package; use 1 for deterministic diagnosis
        required: false
        default: '1'
        type: string
      check_timeout_minutes:
        description: Maximum runtime for cargo check
        required: false
        default: '20'
        type: string
      clippy_timeout_minutes:
        description: Maximum runtime for cargo clippy
        required: false
        default: '30'
        type: string

permissions:
  contents: read

concurrency:
  group: v2-3-0-candidate-${{ inputs.candidate_sha || github.sha }}-${{ inputs.mode }}
  cancel-in-progress: false

jobs:
  workspace:
    uses: ./.github/workflows/v2_3_0_workspace_validation.yml
    with:
      candidate_sha: ${{ inputs.candidate_sha || github.sha }}
      package_test_timeout_minutes: ${{ inputs.package_test_timeout_minutes }}
      test_threads: ${{ inputs.test_threads }}
      check_timeout_minutes: ${{ inputs.check_timeout_minutes }}
      clippy_timeout_minutes: ${{ inputs.clippy_timeout_minutes }}

  staged-network:
    needs: workspace
    uses: ./.github/workflows/v2_3_0_staged_network_gate.yml
    with:
      candidate_sha: ${{ inputs.candidate_sha || github.sha }}
      duration_secs: ${{ inputs.duration_secs }}
      quiescence_wait_secs: ${{ inputs.quiescence_wait_secs }}

  mempool-relay:
    needs: workspace
    uses: ./.github/workflows/v2_3_0_mempool_tx_relay_gate.yml
    with:
      candidate_sha: ${{ inputs.candidate_sha || github.sha }}
      evidence_mode: ${{ inputs.mode == 'runtime-closeout' && 'runtime-closeout' || 'unit-contract' }}

  lag-injection:
    needs: workspace
    uses: ./.github/workflows/v2_3_0_lag_injection_gate.yml
    with:
      candidate_sha: ${{ inputs.candidate_sha || github.sha }}
      evidence_mode: ${{ inputs.mode == 'runtime-closeout' && 'runtime-closeout' || 'schema-only' }}
      min_selected_gap: ${{ inputs.min_selected_gap }}

  prune-restart-rejoin:
    needs: workspace
    uses: ./.github/workflows/v2_3_0_prune_restart_rejoin_gate.yml
    with:
      candidate_sha: ${{ inputs.candidate_sha || github.sha }}
      evidence_mode: ${{ inputs.mode == 'runtime-closeout' && 'runtime-closeout' || 'test-gate' }}

  final-decision:
    name: Candidate gate decision
    if: always()
    needs:
      - workspace
      - staged-network
      - mempool-relay
      - lag-injection
      - prune-restart-rejoin
    runs-on: ubuntu-24.04
    steps:
      - name: Create candidate result manifest
        shell: bash
        env:
          CANDIDATE_SHA: ${{ inputs.candidate_sha || github.sha }}
          MODE: ${{ inputs.mode }}
          WORKSPACE_RESULT: ${{ needs.workspace.result }}
          STAGED_RESULT: ${{ needs.staged-network.result }}
          MEMPOOL_RESULT: ${{ needs.mempool-relay.result }}
          LAG_RESULT: ${{ needs.lag-injection.result }}
          PRUNE_RESULT: ${{ needs.prune-restart-rejoin.result }}
        run: |
          set -euo pipefail
          mkdir -p ci-evidence/candidate-decision
          python3 - <<'PY'
          import json, os, pathlib
          results = {
            'workspace':os.environ['WORKSPACE_RESULT'],
            'staged_network_1m_2m_4m':os.environ['STAGED_RESULT'],
            'mempool_transaction_relay':os.environ['MEMPOOL_RESULT'],
            'selected_segment_lag_injection':os.environ['LAG_RESULT'],
            'prune_restart_rejoin':os.environ['PRUNE_RESULT'],
          }
          all_pass = all(v == 'success' for v in results.values())
          mode = os.environ['MODE']
          closeout = mode == 'runtime-closeout' and all_pass
          manifest = {
            'gate':'v2.3.0-candidate-closeout',
            'requested_candidate':os.environ['CANDIDATE_SHA'],
            'mode':mode,
            'results':results,
            'result':'PASS' if all_pass else 'FAIL',
            'closeout_eligible':closeout,
            'decision':'GO_TO_START_V2_3_0_REVIEW' if closeout else 'NO_GO',
            'public_testnet_ready':False,
            'thirty_day_public_testnet_clock_started':False,
          }
          pathlib.Path('ci-evidence/candidate-decision/evidence_manifest.json').write_text(json.dumps(manifest, indent=2)+'\n')
          PY
          sha256sum ci-evidence/candidate-decision/evidence_manifest.json > ci-evidence/candidate-decision/SHA256SUMS

      - name: Upload candidate decision
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: v2_3_0_candidate_decision_${{ github.run_id }}
          path: ci-evidence/candidate-decision
          if-no-files-found: error
          retention-days: 90

      - name: Enforce candidate decision
        shell: bash
        env:
          MODE: ${{ inputs.mode }}
        run: |
          set -euo pipefail
          jq -e '.result == "PASS"' ci-evidence/candidate-decision/evidence_manifest.json >/dev/null
          if [[ "$MODE" == runtime-closeout ]]; then
            jq -e '.closeout_eligible == true and .decision == "GO_TO_START_V2_3_0_REVIEW"' ci-evidence/candidate-decision/evidence_manifest.json >/dev/null
          else
            jq -e '.closeout_eligible == false and .decision == "NO_GO"' ci-evidence/candidate-decision/evidence_manifest.json >/dev/null
          fi
