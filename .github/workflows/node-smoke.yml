name: Node Smoke Test

on:
  push:
    branches: [main]

jobs:
  node-smoke:
    runs-on: ubuntu-latest

    steps:
      - uses: actions/checkout@v4
      - uses: dtolnay/rust-toolchain@stable

      - name: Build node
        run: cargo build -p pulsedagd

      - name: Run node
        run: |
          nohup cargo run -p pulsedagd > node.log 2>&1 &
          for i in {1..30}; do
            if curl -sSf http://127.0.0.1:8080/health > /dev/null; then
              echo "Node is healthy"
              exit 0
            fi
            sleep 2
          done
          echo "Node failed to become healthy in time"
          exit 1

      - name: Health check
        run: curl http://127.0.0.1:8080/health
