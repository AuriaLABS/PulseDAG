name: v2.3.0 operator and incident runbooks

on:
  pull_request:
    branches:
      - main
    paths:
      - docs/runbooks/**
      - docs/codex_tasks/v2_3_0_11_operator_incident_runbooks.md
      - scripts/private_testnet/collect_incident_evidence.py
      - scripts/tests/test_v2_3_0_operator_runbooks.sh
      - scripts/validate_v2_3_0_runbooks.py
      - ops/observability/v2.3.0/alert-rules.yml
      - .github/workflows/v2_3_0_operator_runbooks.yml
  workflow_dispatch:

permissions:
  contents: read

jobs:
  runbook-contract:
    runs-on: ubuntu-24.04
    steps:
      - name: Checkout candidate
        uses: actions/checkout@v4

      - name: Preserve v2.3.0 version and readiness guardrails
        shell: bash
        run: |
          set -euo pipefail
          test "$(tr -d '\r\n' < VERSION)" = "v2.3.0"
          test "$(awk '/^version = / {gsub(/"/, "", $3); print $3; exit}' Cargo.toml)" = "2.3.0"
          grep -Fq '`APPROVE_RELEASE_CANDIDATE`' docs/release/V2_3_0_RELEASE_DECISION.md
          grep -Fq '`version_bump_authorized=true`' docs/release/V2_3_0_RELEASE_DECISION.md
          grep -Fq '`public_testnet_ready=false`' docs/release/V2_3_0_RELEASE_DECISION.md
          grep -Fq '`thirty_day_public_testnet_clock_started=false`' docs/release/V2_3_0_RELEASE_DECISION.md

      - name: Validate syntax and English comments
        shell: bash
        run: |
          set -euo pipefail
          python3 -m py_compile \
            scripts/private_testnet/collect_incident_evidence.py \
            scripts/validate_v2_3_0_runbooks.py
          bash -n scripts/tests/test_v2_3_0_operator_runbooks.sh
          python3 scripts/check_code_comment_language.py \
            scripts/private_testnet/collect_incident_evidence.py \
            scripts/validate_v2_3_0_runbooks.py \
            scripts/tests/test_v2_3_0_operator_runbooks.sh

      - name: Run runbook and evidence contract regression
        shell: bash
        run: |
          set -euo pipefail
          mkdir -p ci-evidence/v2.3.0-task11
          bash scripts/tests/test_v2_3_0_operator_runbooks.sh 2>&1 \
            | tee ci-evidence/v2.3.0-task11/runbook-contract.log

      - name: Run repository hygiene
        shell: bash
        run: bash scripts/repository_hygiene.sh --strict

      - name: Build Task 11 evidence manifest
        shell: bash
        env:
          CANDIDATE_SHA: ${{ github.event.pull_request.head.sha || github.sha }}
        run: |
          set -euo pipefail
          python3 - <<'PY'
          import json
          import os
          from pathlib import Path

          output = Path("ci-evidence/v2.3.0-task11")
          manifest = {
              "gate": "v2.3.0-operator-incident-runbooks",
              "candidate_sha": os.environ["CANDIDATE_SHA"],
              "result": "PASS",
              "operations_runbook": True,
              "incident_severity_model": True,
              "security_capacity_runbook": True,
              "alert_runbook_links_valid": True,
              "evidence_redaction": True,
              "evidence_checksums": True,
              "immutable_incident_bundles": True,
              "partial_collection_signaled": True,
              "public_testnet_ready": False,
              "thirty_day_public_testnet_clock_started": False,
          }
          (output / "operator-runbooks-manifest.json").write_text(
              json.dumps(manifest, indent=2) + "\n",
              encoding="utf-8",
          )
          PY
          sha256sum ci-evidence/v2.3.0-task11/* \
            > ci-evidence/v2.3.0-task11/SHA256SUMS

      - name: Enforce Task 11 manifest
        shell: bash
        run: |
          set -euo pipefail
          jq -e '
            .gate == "v2.3.0-operator-incident-runbooks" and
            .result == "PASS" and
            .operations_runbook == true and
            .incident_severity_model == true and
            .security_capacity_runbook == true and
            .alert_runbook_links_valid == true and
            .evidence_redaction == true and
            .evidence_checksums == true and
            .immutable_incident_bundles == true and
            .partial_collection_signaled == true and
            .public_testnet_ready == false and
            .thirty_day_public_testnet_clock_started == false
          ' ci-evidence/v2.3.0-task11/operator-runbooks-manifest.json >/dev/null

      - name: Upload Task 11 evidence
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: v2_3_0_task11_operator_runbooks_${{ github.run_id }}
          path: ci-evidence/v2.3.0-task11
          if-no-files-found: error
          retention-days: 90
