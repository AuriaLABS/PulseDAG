name: v2.2.17 API Security Gate

on:
  pull_request:
    paths:
      - '.github/workflows/**'
      - 'apps/pulsedagd/**'
      - 'crates/pulsedag-rpc/**'
      - 'docs/**'
      - 'README.md'
      - 'VERSION'
      - 'Cargo.toml'
      - 'scripts/**'
  workflow_dispatch:

jobs:
  verify-v2-2-17-gate:
    runs-on: ubuntu-latest
    env:
      CARGO_TERM_COLOR: always
      RUST_TEST_THREADS: 1
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Install Rust
        uses: dtolnay/rust-toolchain@stable

      - name: Cache cargo
        uses: Swatinem/rust-cache@v2

      - name: cargo fmt --check
        run: cargo fmt --all -- --check

      - name: cargo test --workspace
        run: cargo test --workspace

      - name: cargo build --workspace
        run: cargo build --workspace

      - name: targeted pulsedag-rpc tests
        run: |
          set -euo pipefail
          cargo test -p pulsedag-rpc handlers::runtime::tests::
          cargo test -p pulsedag-rpc handlers::release::tests::
          cargo test -p pulsedag-rpc handlers::status::tests::
          cargo test -p pulsedag-rpc handlers::tx::tests::

      - name: targeted pulsedagd config tests
        run: "cargo test -p pulsedagd config::tests::"

      - name: markdown link/file existence checks for v2.2.17 docs
        run: |
          set -euo pipefail
          python3 - <<'PY'
          from pathlib import Path
          import re

          root = Path('.')
          docs = [
              Path('README.md'),
              Path('docs/CLOSING_CHECKLIST_V2_2_17.md'),
              Path('docs/RELEASE_NOTES_V2_2_17.md'),
              Path('docs/OPERATOR_SECURITY_RUNBOOK_V2_2_17.md'),
              Path('docs/RPC_ENDPOINT_INVENTORY_V2_2_17.md'),
              Path('docs/VERSION_MATRIX.md'),
          ]

          missing = []
          link_re = re.compile(r'\[[^\]]+\]\(([^)]+)\)')

          for doc in docs:
              if not doc.is_file():
                  missing.append(f"missing file: {doc}")
                  continue

              text = doc.read_text(encoding='utf-8')
              for raw_target in link_re.findall(text):
                  target = raw_target.strip()
                  if not target or target.startswith('#'):
                      continue
                  if target.startswith(('http://', 'https://', 'mailto:')):
                      continue

                  target = target.split('#', 1)[0].strip()
                  if not target:
                      continue

                  resolved = (doc.parent / target).resolve()
                  try:
                      resolved.relative_to(root.resolve())
                  except ValueError:
                      missing.append(f"{doc}: link escapes repo root: {raw_target}")
                      continue

                  if not resolved.exists():
                      missing.append(f"{doc}: missing link target: {raw_target}")

          if missing:
              raise SystemExit("\n".join(missing))

          print('v2.2.17 markdown link/file checks passed')
          PY

      - name: deny obvious version drift if VERSION/Cargo/README matrix disagree
        run: |
          set -euo pipefail
          version_file="$(tr -d '[:space:]' < VERSION)"
          cargo_version="$(sed -n 's/^version = "\([0-9]\+\.[0-9]\+\.[0-9]\+\)"/\1/p' Cargo.toml | head -n1)"

          expected_tag="v${cargo_version}"
          if [ "${version_file}" != "${expected_tag}" ]; then
            echo "VERSION/Cargo mismatch: VERSION=${version_file}, Cargo=${cargo_version}" >&2
            exit 1
          fi

          if ! rg -q "${version_file}|${cargo_version}" docs/VERSION_MATRIX.md; then
            echo "VERSION_MATRIX missing current version reference" >&2
            exit 1
          fi

          if ! rg -q "${version_file}|${cargo_version}" README.md; then
            echo "README missing current version reference" >&2
            exit 1
          fi

          echo "VERSION/Cargo/README/VERSION_MATRIX drift check passed"

      - name: optional RPC security smoke (local-safe deterministic)
        run: |
          set -euo pipefail
          if [ -x scripts/v2_2_17_rpc_security_smoke.sh ]; then
            scripts/v2_2_17_rpc_security_smoke.sh --mode local-safe
          else
            echo "scripts/v2_2_17_rpc_security_smoke.sh not present; skipping optional smoke"
          fi
