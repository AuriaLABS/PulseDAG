name: Apply pulsedagd workspace regression fix

on:
  push:
    branches:
      - agent/fix-pulsedagd-workspace-regressions
    paths:
      - '.github/workflows/apply_pulsedagd_workspace_regression_fix.yml'
      - 'docs/codex_tasks/fix_pulsedagd_workspace_regressions.md'

permissions:
  contents: write

concurrency:
  group: apply-pulsedagd-workspace-regression-fix
  cancel-in-progress: false

jobs:
  apply-and-validate:
    runs-on: ubuntu-24.04
    timeout-minutes: 50
    steps:
      - name: Checkout repair branch
        uses: actions/checkout@v4
        with:
          ref: agent/fix-pulsedagd-workspace-regressions
          fetch-depth: 0
          token: ${{ secrets.GITHUB_TOKEN }}

      - name: Apply exact regression fixes
        shell: bash
        run: |
          set -euo pipefail
          task='docs/codex_tasks/fix_pulsedagd_workspace_regressions.md'
          if [[ ! -f "$task" ]]; then
            echo 'Task file already removed; another implementation completed first.'
            exit 0
          fi

          python3 - <<'PY'
          from pathlib import Path

          config_path = Path('apps/pulsedagd/src/config.rs')
          config = config_path.read_text()

          helper_anchor = '''    fn env_lock() -> &'static Mutex<()> {
                  static ENV_LOCK: OnceLock<Mutex<()>> = OnceLock::new();
                  ENV_LOCK.get_or_init(|| Mutex::new(()))
              }
          '''
          helper_replacement = '''    fn env_lock() -> &'static Mutex<()> {
                  static ENV_LOCK: OnceLock<Mutex<()>> = OnceLock::new();
                  ENV_LOCK.get_or_init(|| Mutex::new(()))
              }

              fn env_guard() -> std::sync::MutexGuard<'static, ()> {
                  env_lock()
                      .lock()
                      .unwrap_or_else(|poisoned| poisoned.into_inner())
              }
          '''
          if config.count(helper_anchor) != 1:
              raise SystemExit('expected exactly one env_lock helper anchor')
          config = config.replace(helper_anchor, helper_replacement, 1)

          lock_call = 'env_lock().lock().expect("env lock")'
          lock_count = config.count(lock_call)
          if lock_count < 10:
              raise SystemExit(f'expected many direct env lock calls, found {lock_count}')
          config = config.replace(lock_call, 'env_guard()')

          old_test = '''    #[test]
              fn experimental_flags_unlock_millisecond_cadence_and_limits() {
                  let _guard = env_guard();
                  clear_test_env();
                  let mut cfg = Config::defaults_for_profile(ConfigProfile::Local);
                  cfg.apply_cli_args(vec![
                      "--experimental-ghostdag-selection".to_string(),
                      "--experimental-fast-cadence".to_string(),
                      "--target-block-interval-ms".to_string(),
                      "250".to_string(),
                      "--max-parallel-tips".to_string(),
                      "8".to_string(),
                      "--max-merge-set-size".to_string(),
                      "64".to_string(),
                      "--max-orphan-count".to_string(),
                      "2048".to_string(),
                      "--max-pending-missing-parents".to_string(),
                      "1024".to_string(),
                      "--max-block-mass".to_string(),
                      "2000000".to_string(),
                      "--max-template-age-ms".to_string(),
                      "5000".to_string(),
                  ])
                  .expect("experimental config");

                  assert!(cfg.experimental_ghostdag_selection);
                  assert!(cfg.experimental_fast_cadence);
                  assert_eq!(cfg.target_block_interval_ms, 250);
                  assert_eq!(cfg.max_parallel_tips, 8);
                  assert_eq!(cfg.max_merge_set_size, 64);
                  assert_eq!(cfg.max_orphan_count, 2048);
                  assert_eq!(cfg.max_pending_missing_parents, 1024);
                  assert_eq!(cfg.max_block_mass, 2_000_000);
                  assert_eq!(cfg.max_template_age_ms, 5_000);
              }
          '''
          new_test = '''    #[test]
              fn experimental_flags_keep_fast_cadence_guarded_and_apply_limits() {
                  let _guard = env_guard();
                  clear_test_env();
                  let mut cfg = Config::defaults_for_profile(ConfigProfile::Local);
                  cfg.apply_cli_args(vec![
                      "--experimental-ghostdag-selection".to_string(),
                      "--experimental-fast-cadence".to_string(),
                      "--target-block-interval-ms".to_string(),
                      "250".to_string(),
                      "--max-parallel-tips".to_string(),
                      "8".to_string(),
                      "--max-merge-set-size".to_string(),
                      "64".to_string(),
                      "--max-orphan-count".to_string(),
                      "2048".to_string(),
                      "--max-pending-missing-parents".to_string(),
                      "1024".to_string(),
                      "--max-block-mass".to_string(),
                      "2000000".to_string(),
                      "--max-template-age-ms".to_string(),
                      "5000".to_string(),
                  ])
                  .expect("experimental config");

                  assert!(cfg.experimental_ghostdag_selection);
                  assert_eq!(cfg.consensus_mode, ConsensusMode::GhostdagDev);
                  assert!(!cfg.experimental_fast_cadence);
                  assert_eq!(
                      cfg.target_block_interval_ms,
                      pulsedag_core::CONSENSUS_TARGET_BLOCK_INTERVAL_SECS * 1_000
                  );
                  assert_eq!(
                      cfg.target_block_interval_secs,
                      pulsedag_core::CONSENSUS_TARGET_BLOCK_INTERVAL_SECS
                  );
                  assert_eq!(cfg.max_parallel_tips, 8);
                  assert_eq!(cfg.max_merge_set_size, 64);
                  assert_eq!(cfg.max_orphan_count, 2048);
                  assert_eq!(cfg.max_pending_missing_parents, 1024);
                  assert_eq!(cfg.max_block_mass, 2_000_000);
                  assert_eq!(cfg.max_template_age_ms, 5_000);
              }
          '''
          if config.count(old_test) != 1:
              raise SystemExit('expected exactly one stale fast-cadence test')
          config = config.replace(old_test, new_test, 1)
          config_path.write_text(config)

          main_path = Path('apps/pulsedagd/src/main.rs')
          main = main_path.read_text()
          old_order = '''        if self.observed_network_gap < self.configured_min_gap
                      || self.canonical_network_gap < self.configured_min_gap
                  {
                      return Err("network_gap_below_configured_minimum");
                  }
                  if self.observed_network_gap != self.canonical_network_gap {
                      return Err("canonical_gap_disagrees_with_harness_gap");
                  }
          '''
          new_order = '''        if self.observed_network_gap != self.canonical_network_gap {
                      return Err("canonical_gap_disagrees_with_harness_gap");
                  }
                  if self.observed_network_gap < self.configured_min_gap
                      || self.canonical_network_gap < self.configured_min_gap
                  {
                      return Err("network_gap_below_configured_minimum");
                  }
          '''
          if main.count(old_order) != 1:
              raise SystemExit('expected exactly one lag gap validation ordering block')
          main = main.replace(old_order, new_order, 1)

          old_assertions = '''        evidence.configured_min_gap = 96;
                  assert_eq!(
                      evidence.validate(),
                      Err("canonical_gap_disagrees_with_harness_gap")
                  );
                  evidence.canonical_network_gap = 96;
                  evidence.transition_events = vec!["remote_inventory_accepted"];
          '''
          new_assertions = '''        evidence.configured_min_gap = 96;
                  assert_eq!(
                      evidence.validate(),
                      Err("canonical_gap_disagrees_with_harness_gap")
                  );

                  evidence.observed_network_gap = 95;
                  evidence.canonical_network_gap = 95;
                  assert_eq!(
                      evidence.validate(),
                      Err("network_gap_below_configured_minimum")
                  );

                  evidence.observed_network_gap = 97;
                  evidence.canonical_network_gap = 96;
                  assert_eq!(
                      evidence.validate(),
                      Err("canonical_gap_disagrees_with_harness_gap")
                  );

                  evidence.observed_network_gap = 96;
                  evidence.canonical_network_gap = 96;
                  evidence.transition_events = vec!["remote_inventory_accepted"];
          '''
          if main.count(old_assertions) != 1:
              raise SystemExit('expected exactly one lag evidence assertion sequence')
          main = main.replace(old_assertions, new_assertions, 1)
          main_path.write_text(main)

          Path('docs/codex_tasks/fix_pulsedagd_workspace_regressions.md').unlink()
          Path('.github/workflows/apply_pulsedagd_workspace_regression_fix.yml').unlink()
          PY

      - name: Install Rust
        uses: dtolnay/rust-toolchain@stable
        with:
          components: rustfmt, clippy

      - name: Cache cargo
        uses: Swatinem/rust-cache@v2

      - name: Validate focused and package tests
        shell: bash
        run: |
          set -euo pipefail
          cargo fmt --all -- --check
          cargo test -p pulsedagd config::tests --locked -- --nocapture --test-threads=1
          cargo test -p pulsedagd lag_injection_evidence --locked -- --nocapture --test-threads=1
          cargo test -p pulsedagd --locked -- --nocapture --test-threads=1
          cargo check --workspace --locked
          cargo clippy --workspace --all-targets -- -D warnings

      - name: Commit validated fix and cleanup
        shell: bash
        run: |
          set -euo pipefail
          git config user.name github-actions[bot]
          git config user.email 41898282+github-actions[bot]@users.noreply.github.com
          git add apps/pulsedagd/src/config.rs apps/pulsedagd/src/main.rs
          git add -A docs/codex_tasks/fix_pulsedagd_workspace_regressions.md .github/workflows/apply_pulsedagd_workspace_regression_fix.yml
          git diff --cached --check
          git commit -m 'test(pulsedagd): align guarded cadence and lag diagnostics'
          git push origin HEAD:agent/fix-pulsedagd-workspace-regressions
