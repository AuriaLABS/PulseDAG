name: Apply PR 755 clippy test fix

on:
  pull_request:
    branches:
      - main

permissions:
  contents: write

jobs:
  apply-and-validate:
    runs-on: ubuntu-24.04
    steps:
      - uses: actions/checkout@v4
        with:
          ref: agent/fix-selected-segment-durability-closeout
          fetch-depth: 0
      - uses: dtolnay/rust-toolchain@stable
        with:
          components: clippy,rustfmt
      - name: Apply focused source edit
        shell: bash
        run: |
          set -euo pipefail
          python3 - <<'PY'
          from pathlib import Path
          path = Path('crates/pulsedag-rpc/src/handlers/readiness.rs')
          text = path.read_text()
          replacements = {
              '        let mut runtime = crate::api::NodeRuntimeStats::default();\n        runtime.sync_state = "selected_segment_complete".to_string();':
              '        let mut runtime = crate::api::NodeRuntimeStats {\n            sync_state: "selected_segment_complete".to_string(),\n            ..Default::default()\n        };',
              '        let mut runtime = crate::api::NodeRuntimeStats::default();\n        runtime.sync_state = "degraded".to_string();':
              '        let mut runtime = crate::api::NodeRuntimeStats {\n            sync_state: "degraded".to_string(),\n            ..Default::default()\n        };',
          }
          for old, new in replacements.items():
              count = text.count(old)
              if count != 1:
                  raise SystemExit(f'expected one source match, found {count}: {old!r}')
              text = text.replace(old, new)
          path.write_text(text)
          PY
          cargo fmt --all
      - name: Validate tests and clippy
        shell: bash
        run: |
          set -euo pipefail
          cargo test --locked -p pulsedag-rpc historical_sync_failures_warn_after_current_recovery
          cargo test --locked -p pulsedag-rpc current_sync_error_still_blocks_readiness
          cargo clippy --workspace --all-targets -- -D warnings
      - name: Publish validated fix
        shell: bash
        run: |
          set -euo pipefail
          git config user.name "chatgpt-codex-connector[bot]"
          git config user.email "199175422+chatgpt-codex-connector[bot]@users.noreply.github.com"
          git add crates/pulsedag-rpc/src/handlers/readiness.rs
          git commit -m "test: satisfy clippy in sync readiness regressions"
          git push origin HEAD:agent/fix-selected-segment-durability-closeout
