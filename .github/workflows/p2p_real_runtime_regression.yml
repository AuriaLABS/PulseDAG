name: P2P real-swarm initialization regression

on:
  pull_request:
    paths:
      - 'crates/pulsedag-p2p/**'
      - '.github/workflows/v2_3_0_workspace_validation.yml'
      - '.github/workflows/p2p_real_runtime_regression.yml'
      - '.github/workflows/apply_p2p_redial_deadlock_fix.yml'
  workflow_dispatch:
    inputs:
      candidate_sha:
        description: Exact commit/ref to validate; blank uses the triggering SHA
        required: false
        type: string
      compile_timeout_minutes:
        description: Maximum runtime for compiling the P2P test binary
        required: false
        default: '15'
        type: string
      timeout_seconds:
        description: Hard timeout for executing the already-compiled isolated test
        required: false
        default: '120'
        type: string
      stack_snapshot_seconds:
        description: Capture a debugger thread snapshot after this many seconds
        required: false
        default: '15'
        type: string

permissions:
  contents: write
  pull-requests: read

concurrency:
  group: p2p-real-runtime-regression-${{ github.event.pull_request.number || inputs.candidate_sha || github.sha }}
  cancel-in-progress: true

jobs:
  isolated-real-swarm-test:
    name: real_runtime_mode_initializes_without_loopback_labeling
    runs-on: ubuntu-24.04
    timeout-minutes: 25
    steps:
      - name: Checkout candidate
        uses: actions/checkout@v4
        with:
          ref: ${{ inputs.candidate_sha || github.event.pull_request.head.sha || github.sha }}
          fetch-depth: 0
          token: ${{ secrets.GITHUB_TOKEN }}

      - name: Install Rust
        uses: dtolnay/rust-toolchain@stable

      - name: Cache cargo
        uses: Swatinem/rust-cache@v2

      - name: Ensure debugger is available
        shell: bash
        run: |
          set -euo pipefail
          if ! command -v gdb >/dev/null 2>&1; then
            sudo apt-get update
            sudo apt-get install -y gdb
          fi
          gdb --version | head -n1

      - name: Record candidate
        shell: bash
        run: |
          set -euo pipefail
          mkdir -p ci-evidence/p2p-real-runtime
          git rev-parse HEAD | tee ci-evidence/p2p-real-runtime/candidate-sha.txt

      - name: Compile P2P tests without running them
        id: compile
        continue-on-error: true
        shell: bash
        env:
          COMPILE_TIMEOUT_MINUTES: ${{ inputs.compile_timeout_minutes || '15' }}
        run: |
          set -o pipefail
          timeout --signal=TERM --kill-after=30s "${COMPILE_TIMEOUT_MINUTES}m" \
            cargo test -p pulsedag-p2p --locked --no-run 2>&1 \
            | tee ci-evidence/p2p-real-runtime/compile.log
          test_bin="$(find target/debug/deps -maxdepth 1 -type f -perm -111 -name 'pulsedag_p2p-*' | sort | head -n1)"
          [[ -n "$test_bin" ]]
          printf '%s\n' "$test_bin" > ci-evidence/p2p-real-runtime/test-binary.txt

      - name: Run isolated test and capture live thread snapshots
        id: test
        if: steps.compile.outcome == 'success'
        continue-on-error: true
        shell: bash
        env:
          TEST_TIMEOUT_SECONDS: ${{ inputs.timeout_seconds || '120' }}
          STACK_SNAPSHOT_SECONDS: ${{ inputs.stack_snapshot_seconds || '15' }}
          RUST_BACKTRACE: '1'
        run: |
          set -uo pipefail
          root="ci-evidence/p2p-real-runtime"
          log="$root/test.log"
          test_bin="$(cat "$root/test-binary.txt")"
          started="$(date +%s)"
          deadline=$((started + TEST_TIMEOUT_SECONDS))
          snapshot_at=$((started + STACK_SNAPSHOT_SECONDS))
          snapshot_done=0
          timed_out=0

          stdbuf -oL -eL "$test_bin" \
            --exact tests::real_runtime_mode_initializes_without_loopback_labeling \
            --nocapture --test-threads=1 > "$log" 2>&1 &
          test_pid=$!
          printf '%s\n' "$test_pid" > "$root/test-pid.txt"
          echo "test_pid=$test_pid test_binary=$test_bin timeout_seconds=$TEST_TIMEOUT_SECONDS"

          capture_threads() {
            local suffix="$1"
            {
              echo "timestamp_utc=$(date -u +%FT%TZ)"
              echo "pid=$test_pid"
              echo
              echo '## ps'
              ps -L -p "$test_pid" -o pid,tid,ppid,pgid,stat,etime,pcpu,pmem,wchan:32,comm,args || true
              echo
              echo '## proc task state'
              for task in /proc/"$test_pid"/task/*; do
                [[ -d "$task" ]] || continue
                tid="${task##*/}"
                printf '\n### tid=%s\n' "$tid"
                printf 'wchan='; cat "$task/wchan" 2>/dev/null || true
                sed -n '1,35p' "$task/status" 2>/dev/null || true
                sudo -n cat "$task/stack" 2>/dev/null || true
              done
              echo
              echo '## gdb all-thread backtrace'
              timeout 25s sudo -n gdb -q -batch \
                -ex 'set pagination off' \
                -ex 'set print thread-events off' \
                -ex 'thread apply all bt full' \
                -p "$test_pid" || true
              echo
              echo '## current test log'
              tail -n 200 "$log" 2>/dev/null || true
            } > "$root/thread-snapshot-${suffix}.txt" 2>&1
          }

          while kill -0 "$test_pid" 2>/dev/null; do
            now="$(date +%s)"
            if (( snapshot_done == 0 && now >= snapshot_at )); then
              capture_threads "${STACK_SNAPSHOT_SECONDS}s"
              snapshot_done=1
            fi
            if (( now >= deadline )); then
              timed_out=1
              capture_threads "timeout"
              kill -TERM "$test_pid" 2>/dev/null || true
              sleep 3
              kill -0 "$test_pid" 2>/dev/null && kill -KILL "$test_pid" 2>/dev/null || true
              break
            fi
            sleep 1
          done

          if (( timed_out == 1 )); then
            wait "$test_pid" 2>/dev/null || true
            rc=124
          else
            set +e
            wait "$test_pid"
            rc=$?
            set -u
          fi

          cat "$log" || true
          printf '%s\n' "$rc" > "$root/exit-code.txt"
          if (( rc == 124 || rc == 137 )); then
            printf 'TIMEOUT\n' > "$root/result.txt"
          elif (( rc == 0 )); then
            printf 'PASS\n' > "$root/result.txt"
          else
            printf 'FAIL\n' > "$root/result.txt"
          fi
          exit 0

      - name: Capture failure or timeout diagnostics
        if: always()
        shell: bash
        env:
          COMPILE_RESULT: ${{ steps.compile.outcome }}
        run: |
          set -euo pipefail
          root="ci-evidence/p2p-real-runtime"
          if [[ "$COMPILE_RESULT" != success ]]; then
            printf '2\n' > "$root/exit-code.txt"
            printf 'COMPILE_FAIL\n' > "$root/result.txt"
          fi
          rc="$(cat "$root/exit-code.txt" 2>/dev/null || echo 1)"
          if [[ "$rc" != 0 ]]; then
            {
              echo "timestamp_utc=$(date -u +%FT%TZ)"
              echo "compile_result=$COMPILE_RESULT"
              echo "exit_code=$rc"
              echo "result=$(cat "$root/result.txt" 2>/dev/null || echo UNKNOWN)"
              echo
              echo '## process table'
              ps -eo pid,ppid,pgid,stat,etime,pcpu,pmem,comm,args || true
              echo
              echo '## process tree'
              command -v pstree >/dev/null 2>&1 && pstree -ap || true
              echo
              echo '## listening sockets'
              command -v ss >/dev/null 2>&1 && ss -ltnp || true
              echo
              echo '## final compile output'
              tail -n 200 "$root/compile.log" 2>/dev/null || true
              echo
              echo '## final test output'
              tail -n 400 "$root/test.log" 2>/dev/null || true
            } > "$root/diagnostics.txt"
            pkill -TERM -f 'target/debug/deps/pulsedag_p2p-' 2>/dev/null || true
            sleep 2
            pkill -KILL -f 'target/debug/deps/pulsedag_p2p-' 2>/dev/null || true
          fi
          sha256sum "$root"/* > "$root/SHA256SUMS.tmp" || true
          grep -v 'SHA256SUMS' "$root/SHA256SUMS.tmp" > "$root/SHA256SUMS" || true
          rm -f "$root/SHA256SUMS.tmp"

      - name: Upload focused evidence
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: p2p_real_runtime_regression_${{ github.run_id }}
          path: ci-evidence/p2p-real-runtime
          if-no-files-found: error
          retention-days: 30

      - name: Apply confirmed recursive-lock fix to PR branch
        if: always() && github.event_name == 'pull_request'
        shell: bash
        env:
          HEAD_REF: ${{ github.event.pull_request.head.ref }}
        run: |
          set -euo pipefail
          root="ci-evidence/p2p-real-runtime"
          result="$(cat "$root/result.txt" 2>/dev/null || echo UNKNOWN)"
          [[ "$result" == TIMEOUT ]] || { echo "No timeout; source autopatch not required."; exit 0; }
          cat "$root"/thread-snapshot-*.txt > "$root/combined-thread-snapshots.txt"
          grep -q 'pulsedag_p2p::run_libp2p_real_runtime' "$root/combined-thread-snapshots.txt"
          grep -q 'pulsedag_p2p::note_swarm_event' "$root/combined-thread-snapshots.txt"
          grep -q 'Mutex<pulsedag_p2p::InnerState>::lock' "$root/combined-thread-snapshots.txt"

          python3 - <<'PY'
          from pathlib import Path
          path = Path('crates/pulsedag-p2p/src/lib.rs')
          source = path.read_text()
          old = '''                    } else if let Ok(mut guard) = inner.lock() {
                        pending_bootnode_dials.insert(*peer_id);
                        bootnode_redial_backoff_secs.insert(*peer_id, 1);
                        bootnode_next_redial_at.insert(*peer_id, now.saturating_add(1));
                        guard.pending_bootnode_dials.insert(peer_id.to_string());
                        guard.pending_bootnode_dial_started_at.insert(peer_id.to_string(), now);
                        guard.bootnode_redial_backoff_secs.insert(peer_id.to_string(), 1);
                        guard.bootnode_next_redial_at.insert(peer_id.to_string(), now.saturating_add(1));
                        guard.bootnode_redial_successes = guard.bootnode_redial_successes.saturating_add(1);
                        note_swarm_event(&inner, format!("dial-success:redial:{peer_id}"));
                    }
'''
          new = '''                    } else {
                        if let Ok(mut guard) = inner.lock() {
                            pending_bootnode_dials.insert(*peer_id);
                            bootnode_redial_backoff_secs.insert(*peer_id, 1);
                            bootnode_next_redial_at.insert(*peer_id, now.saturating_add(1));
                            guard.pending_bootnode_dials.insert(peer_id.to_string());
                            guard.pending_bootnode_dial_started_at.insert(peer_id.to_string(), now);
                            guard.bootnode_redial_backoff_secs.insert(peer_id.to_string(), 1);
                            guard.bootnode_next_redial_at.insert(peer_id.to_string(), now.saturating_add(1));
                            guard.bootnode_redial_successes =
                                guard.bootnode_redial_successes.saturating_add(1);
                        }
                        note_swarm_event(&inner, format!("dial-success:redial:{peer_id}"));
                    }
'''
          count = source.count(old)
          if count != 1:
              raise SystemExit(f'expected exactly one confirmed deadlocking block, found {count}')
          path.write_text(source.replace(old, new, 1))
          Path('.github/workflows/apply_p2p_redial_deadlock_fix.yml').unlink(missing_ok=True)
          PY

          cargo fmt --all -- --check
          git config user.name github-actions[bot]
          git config user.email 41898282+github-actions[bot]@users.noreply.github.com
          git add crates/pulsedag-p2p/src/lib.rs .github/workflows/apply_p2p_redial_deadlock_fix.yml
          git diff --cached --check
          git commit -m 'fix(p2p): avoid recursive lock during redial success'
          git push origin HEAD:"$HEAD_REF"

      - name: Enforce isolated test
        if: always()
        shell: bash
        env:
          COMPILE_RESULT: ${{ steps.compile.outcome }}
        run: |
          set -euo pipefail
          [[ "$COMPILE_RESULT" == success ]]
          [[ "$(cat ci-evidence/p2p-real-runtime/result.txt)" == PASS ]]
          [[ "$(cat ci-evidence/p2p-real-runtime/exit-code.txt)" == 0 ]]
