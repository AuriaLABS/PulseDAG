name: Apply v2.3.0 runtime round-4 fixes

on:
  pull_request:
    branches:
      - main

permissions:
  contents: write

concurrency:
  group: apply-v2-3-0-runtime-round4-${{ github.sha }}
  cancel-in-progress: true

jobs:
  apply-and-validate:
    if: github.actor != 'github-actions[bot]'
    runs-on: ubuntu-24.04
    timeout-minutes: 90
    steps:
      - name: Checkout patch branch
        uses: actions/checkout@v4
        with:
          ref: agent/fix-v2-3-0-runtime-closeout-round-4
          fetch-depth: 0

      - name: Install Rust
        uses: dtolnay/rust-toolchain@stable
        with:
          components: rustfmt

      - name: Cache cargo
        uses: Swatinem/rust-cache@v2

      - name: Apply fail-closed source patches
        run: |
          set -euo pipefail
          python3 scripts/lib/apply_v2_3_0_runtime_round4_patch.py
          python3 scripts/lib/apply_v2_3_0_runtime_round4_followup.py
          python3 -m py_compile \
            scripts/lib/apply_v2_3_0_runtime_round4_patch.py \
            scripts/lib/apply_v2_3_0_runtime_round4_followup.py \
            scripts/tests/test_v2_3_0_selected_segment_source_semantics.py

      - name: Format and validate contracts
        run: |
          set -euo pipefail
          cargo fmt --all
          cargo fmt --all -- --check
          bash -n scripts/v2_3_0_prune_restart_rejoin_runtime.sh
          bash -n scripts/tests/test_v2_3_0_lag_runtime_driver.sh
          python3 scripts/tests/test_v2_3_0_selected_segment_source_semantics.py \
            apps/pulsedagd/src/main.rs \
            crates/pulsedag-rpc/src/handlers/metrics.rs
          bash scripts/tests/test_v2_3_0_lag_runtime_driver.sh
          git diff --check

      - name: Verify confirmed mempool cleanup
        run: cargo test -p pulsedag-core --test confirmed_mempool_cleanup --locked -- --nocapture

      - name: Verify canonical sync tests
        run: cargo test -p pulsedag-rpc canonical_sync --locked -- --nocapture

      - name: Verify pulsedagd compiles
        run: cargo check -p pulsedagd --locked

      - name: Publish validated source commit
        run: |
          set -euo pipefail
          git config user.name github-actions[bot]
          git config user.email 41898282+github-actions[bot]@users.noreply.github.com
          git rm --ignore-unmatch \
            .github/workflows/apply_v2_3_0_runtime_round4_patch.yml \
            .github/workflows/finalize_v2_3_0_runtime_round4_patch.yml \
            scripts/lib/apply_v2_3_0_runtime_round4_patch.py \
            scripts/lib/apply_v2_3_0_runtime_round4_followup.py \
            .runtime-round4-trigger
          git add \
            apps/pulsedagd/src/main.rs \
            crates/pulsedag-core/src/apply.rs \
            crates/pulsedag-core/tests/confirmed_mempool_cleanup.rs \
            crates/pulsedag-rpc/src/handlers/metrics.rs \
            scripts/tests/test_v2_3_0_lag_runtime_driver.sh \
            scripts/tests/test_v2_3_0_selected_segment_source_semantics.py \
            .github/workflows/v2_3_0_prune_restart_rejoin_gate.yml
          git diff --cached --check
          git commit -m 'Fix runtime mempool cleanup and selected-segment closeout'
          git push origin HEAD:agent/fix-v2-3-0-runtime-closeout-round-4
