name: Apply v2.3.0 runtime round-4 fixes

on:
  push:
    branches:
      - agent/fix-v2-3-0-runtime-closeout-round-4
  pull_request:
    branches:
      - main

permissions:
  contents: write

concurrency:
  group: apply-v2-3-0-runtime-round4
  cancel-in-progress: false

jobs:
  apply-and-validate:
    if: github.actor != 'github-actions[bot]'
    runs-on: ubuntu-24.04
    timeout-minutes: 90
    steps:
      - name: Checkout patch branch
        uses: actions/checkout@v4
        with:
          ref: agent/fix-v2-3-0-runtime-closeout-round-4
          fetch-depth: 0

      - name: Install Rust
        uses: dtolnay/rust-toolchain@stable
        with:
          components: rustfmt

      - name: Cache cargo
        uses: Swatinem/rust-cache@v2

      - name: Apply fail-closed source patch
        run: |
          set -euo pipefail
          python3 scripts/lib/apply_v2_3_0_runtime_round4_patch.py
          python3 -m py_compile scripts/lib/apply_v2_3_0_runtime_round4_patch.py
          python3 - <<'PY'
          from pathlib import Path
          path = Path('scripts/tests/test_v2_3_0_lag_runtime_driver.sh')
          text = path.read_text()
          old = "grep -Fq 'rt.peer_addressed_getblock_sent_total = rt' \"$NODE_MAIN\""
          new = "grep -Fq 'rt.peer_addressed_getblock_sent_total' \"$NODE_MAIN\""
          if text.count(old) != 1:
              raise SystemExit(f'expected one rustfmt-sensitive peer counter assertion, found {text.count(old)}')
          path.write_text(text.replace(old, new, 1))
          PY

      - name: Format patched Rust
        run: |
          set -euxo pipefail
          cargo fmt --all
          cargo fmt --all -- --check

      - name: Validate patched shell contracts
        run: |
          set -euxo pipefail
          bash -n scripts/v2_3_0_prune_restart_rejoin_runtime.sh
          bash -n scripts/tests/test_v2_3_0_lag_runtime_driver.sh
          bash -x scripts/tests/test_v2_3_0_lag_runtime_driver.sh

      - name: Check patch whitespace
        run: |
          set -euxo pipefail
          git diff --check

      - name: Verify confirmed mempool cleanup
        run: |
          set -euo pipefail
          cargo test -p pulsedag-core --test confirmed_mempool_cleanup --locked -- --nocapture

      - name: Verify pulsedagd compiles
        run: |
          set -euo pipefail
          cargo check -p pulsedagd --locked

      - name: Publish validated source commit
        run: |
          set -euo pipefail
          git config user.name github-actions[bot]
          git config user.email 41898282+github-actions[bot]@users.noreply.github.com
          git rm .github/workflows/apply_v2_3_0_runtime_round4_patch.yml
          git rm scripts/lib/apply_v2_3_0_runtime_round4_patch.py
          git add apps/pulsedagd/src/main.rs \
            crates/pulsedag-core/src/apply.rs \
            crates/pulsedag-core/tests/confirmed_mempool_cleanup.rs \
            scripts/tests/test_v2_3_0_lag_runtime_driver.sh \
            .github/workflows/v2_3_0_prune_restart_rejoin_gate.yml
          git diff --cached --check
          git commit -m 'Fix runtime mempool cleanup and selected-segment closeout'
          git push origin HEAD:agent/fix-v2-3-0-runtime-closeout-round-4
