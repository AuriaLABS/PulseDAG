name: Apply v2.3.0 runtime round-4 fixes

on:
  pull_request:
    branches:
      - main

permissions:
  contents: write

concurrency:
  group: apply-v2-3-0-runtime-round4-${{ github.sha }}
  cancel-in-progress: true

jobs:
  publish-validated-source:
    if: github.actor != 'github-actions[bot]'
    runs-on: ubuntu-24.04
    timeout-minutes: 45
    steps:
      - name: Checkout patch branch
        uses: actions/checkout@v4
        with:
          ref: agent/fix-v2-3-0-runtime-closeout-round-4
          fetch-depth: 0

      - name: Install Rust
        uses: dtolnay/rust-toolchain@stable
        with:
          components: rustfmt

      - name: Apply validated patches
        run: |
          set -euo pipefail
          python3 scripts/lib/apply_v2_3_0_runtime_round4_patch.py
          python3 scripts/lib/apply_v2_3_0_runtime_round4_followup.py
          cargo fmt --all
          cargo fmt --all -- --check
          bash -n scripts/v2_3_0_prune_restart_rejoin_runtime.sh
          bash -n scripts/tests/test_v2_3_0_lag_runtime_driver.sh
          python3 scripts/tests/test_v2_3_0_selected_segment_source_semantics.py \
            apps/pulsedagd/src/main.rs \
            crates/pulsedag-rpc/src/handlers/metrics.rs
          bash scripts/tests/test_v2_3_0_lag_runtime_driver.sh
          git diff --check

      - name: Publish validated source only
        run: |
          set -euo pipefail
          git config user.name github-actions[bot]
          git config user.email 41898282+github-actions[bot]@users.noreply.github.com
          git add \
            apps/pulsedagd/src/main.rs \
            crates/pulsedag-core/src/apply.rs \
            crates/pulsedag-core/tests/confirmed_mempool_cleanup.rs \
            crates/pulsedag-rpc/src/handlers/metrics.rs \
            scripts/tests/test_v2_3_0_lag_runtime_driver.sh \
            scripts/tests/test_v2_3_0_selected_segment_source_semantics.py
          git diff --cached --check
          git commit -m 'Fix runtime mempool cleanup and selected-segment closeout'
          git push origin HEAD:agent/fix-v2-3-0-runtime-closeout-round-4
