name: Apply PR 755 compact parent context fix

on:
  pull_request:
    branches:
      - main

permissions:
  contents: write

jobs:
  apply-and-validate:
    runs-on: ubuntu-24.04
    steps:
      - uses: actions/checkout@v4
        with:
          ref: agent/fix-selected-segment-durability-closeout
          fetch-depth: 0
      - name: Apply focused patch
        shell: bash
        run: |
          set -euo pipefail
          git apply --check .github/patches/pr755_compact_parent_context.patch
          git apply .github/patches/pr755_compact_parent_context.patch
      - name: Format and run focused regressions
        shell: bash
        run: |
          set -euo pipefail
          cargo fmt --all
          cargo test --locked -p pulsedag-core compact_pruned_selected_tip_validates_next_block_from_snapshot_utxo
          cargo test --locked -p pulsedag-core side_branch_validates_against_parent_context_not_selected_tip
          cargo test --locked -p pulsedag-storage compact_prune_97_to_24_restarts_with_identical_tip_and_state_root
      - name: Publish validated fix
        shell: bash
        run: |
          set -euo pipefail
          git config user.name "chatgpt-codex-connector[bot]"
          git config user.email "199175422+chatgpt-codex-connector[bot]@users.noreply.github.com"
          git add crates/pulsedag-core/src/validation.rs
          git commit -m "fix: validate post-prune blocks from compact snapshot state"
          git push origin HEAD:agent/fix-selected-segment-durability-closeout
