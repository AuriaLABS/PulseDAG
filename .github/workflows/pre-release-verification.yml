name: pre-burn-in-verification

on:
  workflow_dispatch:
    inputs:
      release_tag:
        description: "Release tag under verification (example: v2.2.5-rc1)"
        required: false
        default: "v2.2.5"
        type: string
  pull_request:
    paths:
      - '.github/workflows/**'
      - 'scripts/**'
      - 'docs/**'
      - 'Cargo.toml'
      - 'Cargo.lock'

permissions:
  contents: read

jobs:
  workspace-validation:
    uses: ./.github/workflows/v2_3_0_workspace_validation.yml
    with:
      candidate_sha: ${{ github.event.pull_request.head.sha || github.sha }}
      test_compile_timeout_minutes: '30'
      package_test_timeout_minutes: '10'
      p2p_real_runtime_test_timeout_seconds: '120'
      test_threads: '1'
      check_timeout_minutes: '20'
      clippy_timeout_minutes: '30'

  verify:
    name: verify-pre-burn-in-readiness
    needs: workspace-validation
    runs-on: ubuntu-latest
    timeout-minutes: 120
    env:
      RELEASE_TAG: ${{ github.event.inputs.release_tag || 'v2.2.5' }}
      RUST_TEST_THREADS: 1
      NODE_URL: http://127.0.0.1:8080
    steps:
      - name: Checkout validated candidate
        uses: actions/checkout@v4
        with:
          ref: ${{ github.event.pull_request.head.sha || github.sha }}
          fetch-depth: 1

      - name: Install Rust
        uses: dtolnay/rust-toolchain@stable

      - name: Cache cargo
        uses: Swatinem/rust-cache@v2

      - name: Install Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.x"

      - name: Reclaim runner disk space for rust build/test footprint
        run: |
          set -euo pipefail
          echo "disk usage before cleanup:"
          df -h

          sudo rm -rf /usr/local/lib/android || true
          sudo rm -rf /opt/ghc || true
          sudo rm -rf /opt/hostedtoolcache/CodeQL || true
          sudo apt-get clean || true

          echo "disk usage after cleanup:"
          df -h

      - name: Verify standalone miner crate build surface
        run: |
          timeout --signal=TERM --kill-after=30s 20m \
            cargo check --locked -p pulsedag-miner

      - name: Build release binaries (node + standalone miner)
        run: |
          timeout --signal=TERM --kill-after=30s 45m \
            cargo build --locked --release --bin pulsedagd --bin pulsedag-miner

      - name: Verify node startup smoke
        run: |
          set -euo pipefail
          nohup cargo run -p pulsedagd > node.log 2>&1 &
          node_pid=$!
          trap 'kill "$node_pid" 2>/dev/null || true' EXIT
          for i in {1..45}; do
            if curl -sSf "${NODE_URL}/health" >/dev/null; then
              echo "node startup smoke passed"
              exit 0
            fi
            sleep 2
          done
          echo "node startup smoke failed: ${NODE_URL}/health unavailable" >&2
          echo "last node.log lines:" >&2
          tail -n 50 node.log >&2 || true
          exit 1

      - name: Verify external standalone miner one-shot
        run: |
          set -euo pipefail
          timeout --signal=TERM --kill-after=30s 10m \
            cargo run -p pulsedag-miner -- \
              --node "${NODE_URL}" \
              --miner-address preburnin-smoke \
              --max-tries 12000

      - name: Verify standalone operator flow helper
        run: |
          set -euo pipefail
          timeout --signal=TERM --kill-after=30s 10m \
            scripts/release/standalone_operator_smoke.sh \
              --miner-address preburnin-operator \
              --node-url "${NODE_URL}" \
              --max-tries 5000 \
              --threads 1 \
              --wait-seconds 45

      - name: Package release artifacts
        run: |
          set -euo pipefail
          mkdir -p dist
          python scripts/release/package_release_artifacts.py \
            --binary target/release/pulsedagd \
            --output-dir dist \
            --tag "${RELEASE_TAG}" \
            --bin-name pulsedagd \
            --repository "${GITHUB_REPOSITORY}" \
            --commit "${GITHUB_SHA}" \
            --run-id "${GITHUB_RUN_ID}" \
            --run-attempt "${GITHUB_RUN_ATTEMPT}"

          python scripts/release/package_release_artifacts.py \
            --binary target/release/pulsedag-miner \
            --output-dir dist \
            --tag "${RELEASE_TAG}" \
            --bin-name pulsedag-miner \
            --repository "${GITHUB_REPOSITORY}" \
            --commit "${GITHUB_SHA}" \
            --run-id "${GITHUB_RUN_ID}" \
            --run-attempt "${GITHUB_RUN_ATTEMPT}"

      - name: Verify packaged standalone miner artifact and smoke wiring
        run: |
          set -euo pipefail
          python scripts/release/verify_release_artifacts.py \
            --artifacts-dir dist \
            --expected-tag "${RELEASE_TAG}" \
            --smoke \
            --expect-binaries pulsedag-miner

      - name: Verify packaged node+miner artifacts and smoke wiring
        run: |
          set -euo pipefail
          python scripts/release/verify_release_artifacts.py \
            --artifacts-dir dist \
            --expected-tag "${RELEASE_TAG}" \
            --smoke \
            --expect-binaries pulsedagd pulsedag-miner

      - name: Verify hot-path baseline helper wiring
        run: |
          set -euo pipefail
          scripts/hot-path-baseline.sh --help

      - name: Verify p2p sync/rpc baseline harness syntax
        run: |
          set -euo pipefail
          python -m py_compile scripts/p2p_sync_rpc_baselines.py

      - name: Verify pre-burn-in docs, evidence, and checklist references
        run: |
          set -euo pipefail
          required=(
            docs/release/ARTIFACTS.md
            docs/RELEASE_EVIDENCE.md
            docs/BURN_IN_GATE.md
            docs/checklists/V2_2_5_BURNIN_CLOSEOUT.md
            docs/checklists/PUBLIC_TESTNET_OPERATOR_ENTRY_CHECKLIST.md
            scripts/release/standalone_operator_smoke.sh
            scripts/release/verify_release_artifacts.py
            scripts/hot-path-baseline.sh
            scripts/p2p_sync_rpc_baselines.py
          )

          for path in "${required[@]}"; do
            if [ ! -f "${path}" ]; then
              echo "pre-burn-in verification failed: missing required reference ${path}" >&2
              exit 1
            fi
            echo "found: ${path}"
          done

      - name: Verify helper executability and Python entrypoints
        run: |
          set -euo pipefail
          executable_helpers=(
            scripts/release/standalone_operator_smoke.sh
            scripts/hot-path-baseline.sh
          )
          for helper in "${executable_helpers[@]}"; do
            if [ ! -x "${helper}" ]; then
              echo "pre-burn-in verification failed: helper not executable ${helper}" >&2
              exit 1
            fi
            echo "executable: ${helper}"
          done

          python scripts/release/package_release_artifacts.py --help >/dev/null
          python scripts/release/verify_release_artifacts.py --help >/dev/null
          python scripts/p2p_sync_rpc_baselines.py --help >/dev/null
          echo "python entrypoints verified"
