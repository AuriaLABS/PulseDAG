name: pre-release-verification

on:
  workflow_dispatch:
    inputs:
      release_tag:
        description: "Release tag under verification (example: v2.2.5-rc1)"
        required: false
        default: "v2.2.5"
        type: string
  pull_request:
    paths:
      - '.github/workflows/**'
      - 'scripts/**'
      - 'docs/**'
      - 'Cargo.toml'
      - 'Cargo.lock'

jobs:
  verify:
    name: verify-pre-release-readiness
    runs-on: ubuntu-latest
    env:
      RELEASE_TAG: ${{ github.event.inputs.release_tag || 'v2.2.5' }}
      RUST_TEST_THREADS: 1
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Install Rust
        uses: dtolnay/rust-toolchain@stable

      - name: Cache cargo
        uses: Swatinem/rust-cache@v2

      - name: Install Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.x"

      - name: Verify workspace test health
        run: cargo test --workspace

      - name: Verify pulsedag-rpc test health
        run: cargo test -p pulsedag-rpc --all-targets

      - name: Verify pulsedag-p2p test health
        run: cargo test -p pulsedag-p2p

      - name: Verify node smoke health
        run: |
          set -euo pipefail
          cargo build -p pulsedagd
          nohup cargo run -p pulsedagd > node.log 2>&1 &
          for i in {1..30}; do
            if curl -sSf http://127.0.0.1:8080/health > /dev/null; then
              echo "Node is healthy"
              exit 0
            fi
            sleep 2
          done
          echo "Node failed to become healthy in time" >&2
          exit 1

      - name: Verify miner smoke health (standalone external miner)
        run: |
          set -euo pipefail
          cargo run -p pulsedag-miner -- \
            --node http://127.0.0.1:8080 \
            --miner-address prerelease-smoke \
            --max-tries 10000

      - name: Build release binaries (node + standalone miner)
        run: cargo build --locked --release --bin pulsedagd --bin pulsedag-miner

      - name: Package release artifacts
        run: |
          set -euo pipefail
          mkdir -p dist
          python scripts/release/package_release_artifacts.py \
            --binary target/release/pulsedagd \
            --output-dir dist \
            --tag "${RELEASE_TAG}" \
            --bin-name pulsedagd \
            --repository "${GITHUB_REPOSITORY}" \
            --commit "${GITHUB_SHA}" \
            --run-id "${GITHUB_RUN_ID}" \
            --run-attempt "${GITHUB_RUN_ATTEMPT}"

          python scripts/release/package_release_artifacts.py \
            --binary target/release/pulsedag-miner \
            --output-dir dist \
            --tag "${RELEASE_TAG}" \
            --bin-name pulsedag-miner \
            --repository "${GITHUB_REPOSITORY}" \
            --commit "${GITHUB_SHA}" \
            --run-id "${GITHUB_RUN_ID}" \
            --run-attempt "${GITHUB_RUN_ATTEMPT}"

      - name: Verify release artifact flow still passes
        run: |
          set -euo pipefail
          python scripts/release/verify_release_artifacts.py \
            --artifacts-dir dist \
            --expected-tag "${RELEASE_TAG}" \
            --smoke \
            --expect-binaries pulsedagd pulsedag-miner

      - name: Verify standalone operator smoke helper wiring
        run: |
          set -euo pipefail
          scripts/release/standalone_operator_smoke.sh --help

      - name: Verify hot-path baseline helper wiring
        run: |
          set -euo pipefail
          scripts/hot-path-baseline.sh --help

      - name: Verify baseline harness syntax
        run: |
          set -euo pipefail
          python -m py_compile scripts/p2p_sync_rpc_baselines.py

      - name: Verify release docs and checklist references
        run: |
          set -euo pipefail
          required=(
            docs/release/ARTIFACTS.md
            docs/RELEASE_EVIDENCE.md
            docs/checklists/V2_2_5_BURNIN_CLOSEOUT.md
            scripts/release/standalone_operator_smoke.sh
            scripts/release/verify_release_artifacts.py
          )

          for path in "${required[@]}"; do
            if [ ! -f "${path}" ]; then
              echo "Missing required pre-release reference: ${path}" >&2
              exit 1
            fi
            echo "found: ${path}"
          done
