name: Repository hygiene

on:
  pull_request:
    paths:
      - apps/**
      - crates/**
      - scripts/**
      - configs/**
      - docs/**
      - README.md
      - CONTRIBUTING.md
      - VERSION
      - Cargo.toml
      - Cargo.lock
      - Dockerfile.rehearsal
      - docker-compose.rehearsal.yml
      - .editorconfig
      - .gitignore
      - .github/pull_request_template.md
      - .github/workflows/**
  push:
    branches:
      - main
  workflow_dispatch:

permissions:
  contents: read

jobs:
  hygiene:
    runs-on: ubuntu-24.04
    steps:
      - name: Checkout candidate
        uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Preserve v2.3.0 version and readiness guardrails
        shell: bash
        run: |
          set -euo pipefail
          test "$(tr -d '\r\n' < VERSION)" = "v2.3.0"
          test "$(awk '/^version = / {gsub(/"/, "", $3); print $3; exit}' Cargo.toml)" = "2.3.0"
          grep -Fq '`APPROVE_RELEASE_CANDIDATE`' docs/release/V2_3_0_RELEASE_DECISION.md
          grep -Fq '`version_bump_authorized=true`' docs/release/V2_3_0_RELEASE_DECISION.md
          grep -Fq '`public_testnet_ready=false`' docs/release/V2_3_0_RELEASE_DECISION.md
          grep -Fq '`thirty_day_public_testnet_clock_started=false`' docs/release/V2_3_0_RELEASE_DECISION.md
          test -f docs/release/V2_3_0_RELEASE_APPROVAL_RECORD.md
          test -f scripts/validate_v2_3_0_release_candidate.py
          test -f .github/workflows/v2_3_0_release_candidate.yml

      - name: Validate maintenance syntax
        shell: bash
        run: |
          set -euo pipefail
          bash -n scripts/repository_hygiene.sh
          bash -n scripts/list_cleanup_candidates.sh
          bash -n scripts/validate_repo_cleanup.sh
          bash -n scripts/tests/test_repository_hygiene.sh
          python3 -m py_compile \
            scripts/check_code_comment_language.py \
            scripts/repository_hygiene.py \
            scripts/repository_version_surface_audit.py \
            scripts/validate_v2_3_0_release_candidate.py

      - name: Run repository hygiene regression
        shell: bash
        run: bash scripts/tests/test_repository_hygiene.sh

      - name: Build cleanup and version-surface evidence
        if: always()
        shell: bash
        run: |
          set -euo pipefail
          bash scripts/list_cleanup_candidates.sh --write-artifact
          mkdir -p ci-evidence/repository-hygiene
          cp artifacts/repository-hygiene/cleanup-candidates.txt \
            ci-evidence/repository-hygiene/cleanup-candidates.txt
          python3 scripts/repository_version_surface_audit.py --report \
            > ci-evidence/repository-hygiene/version-surface-audit.txt 2>&1
          OUT_DIR=ci-evidence/repository-hygiene \
            python3 scripts/repository_hygiene.py --report
          sha256sum ci-evidence/repository-hygiene/* \
            > ci-evidence/repository-hygiene/SHA256SUMS

      - name: Enforce hygiene manifest and version surface
        if: always()
        shell: bash
        run: |
          set -euo pipefail
          jq -e '
            .gate == "repository-hygiene" and
            .result == "PASS" and
            .failure_count == 0 and
            .public_testnet_ready == false and
            .thirty_day_public_testnet_clock_started == false
          ' ci-evidence/repository-hygiene/repository-hygiene.json >/dev/null
          grep -Fq '[PASS] active repository surfaces identify v2.3.0 consistently' \
            ci-evidence/repository-hygiene/version-surface-audit.txt
          grep -Fq '[PASS] historical documents and workflows are outside active roots' \
            ci-evidence/repository-hygiene/version-surface-audit.txt

      - name: Upload repository hygiene evidence
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: repository_hygiene_${{ github.run_id }}
          path: ci-evidence/repository-hygiene
          if-no-files-found: error
          retention-days: 90
