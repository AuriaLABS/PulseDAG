name: Apply v2.3.0 runtime round-7 fixes

on:
  pull_request:
    branches:
      - main

permissions:
  contents: write

concurrency:
  group: apply-v2-3-0-runtime-round7-${{ github.sha }}
  cancel-in-progress: true

jobs:
  apply-and-validate:
    if: github.actor != 'github-actions[bot]'
    runs-on: ubuntu-24.04
    timeout-minutes: 120
    steps:
      - name: Checkout patch branch
        uses: actions/checkout@v4
        with:
          ref: agent/fix-v2-3-0-runtime-closeout-round-7b
          fetch-depth: 0

      - name: Install Rust
        uses: dtolnay/rust-toolchain@stable
        with:
          components: rustfmt,clippy

      - name: Cache cargo
        uses: Swatinem/rust-cache@v2

      - name: Apply fail-closed source patches
        run: |
          set -euo pipefail
          patcher="scripts/lib/apply_runtime_round7.py"
          base64 -d scripts/lib/runtime_round7_patch.py.gz.b64 | gzip -d > "$patcher"
          python3 -m py_compile "$patcher"
          python3 "$patcher"
          cargo fmt --all
          base64 -d scripts/lib/runtime_round7_finalize.patch.gz.b64 | gzip -d > /tmp/runtime_round7_finalize.patch
          git apply --check /tmp/runtime_round7_finalize.patch
          git apply /tmp/runtime_round7_finalize.patch

      - name: Format and structural checks
        run: |
          set +e
          : > /tmp/structural.log
          check() {
            label="$1"
            shift
            printf 'START %s\n' "$label" | tee -a /tmp/structural.log
            "$@" >> /tmp/structural.log 2>&1
            rc=$?
            printf 'RESULT %s %s\n' "$label" "$rc" | tee -a /tmp/structural.log
            return "$rc"
          }
          check cargo-fmt-pass-1 cargo fmt --all || exit $?
          check cargo-fmt-pass-2 cargo fmt --all || exit $?
          check cargo-fmt-check cargo fmt --all -- --check || exit $?
          check git-diff-check git diff --check || exit $?
          check selected-64-plus-49 grep -q 'selected_segment_chunks_are_strictly_sequential_for_64_plus_49' apps/pulsedagd/src/main.rs || exit $?
          check chunk-close grep -q 'complete_current_chunk_if_applied' apps/pulsedagd/src/main.rs || exit $?
          check core-reexport grep -q 'compact_snapshot_to_retained_blocks' crates/pulsedag-core/src/lib.rs || exit $?
          check prune-checkpoint grep -q 'valid_prune_checkpoint' crates/pulsedag-storage/src/lib.rs || exit $?
          check atomic-prune-storage grep -q 'commit_compact_prune' crates/pulsedag-storage/src/lib.rs || exit $?
          check restart-regression grep -q 'compact_prune_97_to_24_restarts_with_identical_tip_and_state_root' crates/pulsedag-storage/src/lib.rs || exit $?
          check atomic-prune-handler grep -q 'commit_compact_prune' crates/pulsedag-rpc/src/handlers/pruning.rs || exit $?
          if grep -q 'pub prune_checkpoint:' crates/pulsedag-core/src/state.rs; then echo 'RESULT bincode-layout-unchanged 1' | tee -a /tmp/structural.log; exit 1; fi
          echo 'RESULT bincode-layout-unchanged 0' | tee -a /tmp/structural.log
          if grep -q 'session.current_chunk = candidates.clone()' apps/pulsedagd/src/main.rs; then echo 'RESULT stale-chunk-assignment-absent 1' | tee -a /tmp/structural.log; exit 1; fi
          echo 'RESULT stale-chunk-assignment-absent 0' | tee -a /tmp/structural.log

      - name: Selected-segment Rust tests
        run: |
          set +e
          cargo test -p pulsedagd selected_segment --locked -- --nocapture > /tmp/selected-segment.log 2>&1
          rc=$?
          tail -n 240 /tmp/selected-segment.log
          exit "$rc"

      - name: Lag driver contract
        run: |
          set -euo pipefail
          bash scripts/tests/test_v2_3_0_lag_runtime_driver.sh

      - name: Compact snapshot and atomic prune regressions
        run: |
          set +e
          {
            cargo test -p pulsedag-core compact_snapshot --locked -- --nocapture &&
            cargo test -p pulsedag-storage compact_prune --locked -- --nocapture &&
            cargo test -p pulsedag-rpc pruning --locked -- --nocapture &&
            bash scripts/tests/test_v2_3_0_prune_runtime_driver_semantics.sh
          } > /tmp/compact-prune.log 2>&1
          rc=$?
          tail -n 300 /tmp/compact-prune.log
          exit "$rc"

      - name: Compile and lint affected workspace
        run: |
          set -euo pipefail
          cargo check -p pulsedagd -p pulsedag-core -p pulsedag-storage -p pulsedag-rpc --locked
          cargo clippy -p pulsedagd -p pulsedag-core -p pulsedag-storage -p pulsedag-rpc --all-targets --locked -- -D warnings

      - name: Capture failure diagnostics
        if: failure()
        uses: actions/upload-artifact@v4
        with:
          name: round7-final-validation-diagnostics
          if-no-files-found: warn
          path: |
            apps/pulsedagd/src/main.rs
            crates/pulsedag-core/src/consistency.rs
            crates/pulsedag-core/src/lib.rs
            crates/pulsedag-core/src/replay.rs
            crates/pulsedag-storage/src/lib.rs
            crates/pulsedag-rpc/src/handlers/pruning.rs
            /tmp/structural.log
            /tmp/selected-segment.log
            /tmp/compact-prune.log

      - name: Publish validated source commit
        run: |
          set -euo pipefail
          git config user.name github-actions[bot]
          git config user.email 41898282+github-actions[bot]@users.noreply.github.com
          git add \
            apps/pulsedagd/src/main.rs \
            crates/pulsedag-core/src/consistency.rs \
            crates/pulsedag-core/src/lib.rs \
            crates/pulsedag-core/src/replay.rs \
            crates/pulsedag-storage/src/lib.rs \
            crates/pulsedag-rpc/src/handlers/pruning.rs
          git diff --cached --check
          git commit -m 'Chain selected-segment chunks and atomically compact prune snapshots'
          git push origin HEAD:agent/fix-v2-3-0-runtime-closeout-round-7b
