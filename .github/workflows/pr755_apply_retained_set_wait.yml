name: Apply PR 755 retained-set convergence wait

on:
  pull_request:
    branches:
      - main
    paths:
      - .github/workflows/pr755_apply_retained_set_wait.yml
      - .github/scripts/pr755_apply_retained_wait.py

permissions:
  contents: write

concurrency:
  group: pr755-retained-set-convergence-wait
  cancel-in-progress: true

jobs:
  apply-and-validate:
    runs-on: ubuntu-24.04
    steps:
      - uses: actions/checkout@v4
        with:
          ref: agent/fix-selected-segment-durability-closeout
          fetch-depth: 0
      - name: Apply retained-set convergence wait
        run: python3 .github/scripts/pr755_apply_retained_wait.py
      - name: Validate strengthened lag contract
        shell: bash
        run: |
          set -euo pipefail
          bash -n scripts/lib/v2_3_0_runtime_harness.sh
          bash -n scripts/tests/test_v2_3_0_lag_runtime_driver.sh
          bash scripts/tests/test_v2_3_0_lag_runtime_driver.sh
          grep -Fq 'accepted_hash_set_digest' scripts/lib/v2_3_0_runtime_harness.sh
          grep -Fq 'distinct_digests' scripts/lib/v2_3_0_runtime_harness.sh
          grep -Fq '"$memory_count" == "$persisted_count"' scripts/lib/v2_3_0_runtime_harness.sh
      - name: Publish validated wait fix
        shell: bash
        run: |
          set -euo pipefail
          if git diff --quiet; then
            echo 'Retained-set convergence wait already published'
            exit 0
          fi
          git config user.name "chatgpt-codex-connector[bot]"
          git config user.email "199175422+chatgpt-codex-connector[bot]@users.noreply.github.com"
          git add scripts/lib/v2_3_0_runtime_harness.sh scripts/tests/test_v2_3_0_lag_runtime_driver.sh
          git commit -m "fix: wait for retained-set convergence"
          git pull --rebase origin agent/fix-selected-segment-durability-closeout
          git push origin HEAD:agent/fix-selected-segment-durability-closeout
