name: v2.3.0 validate direct peer accounting

on:
  push:
    branches:
      - validation/v2-3-0-12-direct-peer-accounting
    paths:
      - .github/workflows/v2_3_0_validate_direct_peer_accounting.yml

permissions:
  contents: read
  issues: write

jobs:
  complete-p2p-suite:
    runs-on: ubuntu-24.04
    timeout-minutes: 40
    steps:
      - name: Checkout exact PR head plus validation workflow
        uses: actions/checkout@v4

      - name: Install Rust
        uses: dtolnay/rust-toolchain@stable

      - name: Cache cargo
        uses: Swatinem/rust-cache@v2

      - name: Run complete PulseDAG P2P library suite
        shell: bash
        run: |
          set +e
          timeout --signal=TERM --kill-after=30s 30m \
            cargo test --locked -p pulsedag-p2p --lib \
            2>&1 | tee "$RUNNER_TEMP/pulsedag-p2p-full-suite.log"
          rc=${PIPESTATUS[0]}
          echo "P2P_SUITE_RC=$rc" >> "$GITHUB_ENV"
          exit 0

      - name: Report complete P2P suite on PR 767
        if: always()
        uses: actions/github-script@v7
        env:
          SUITE_RC: ${{ env.P2P_SUITE_RC }}
          PR_HEAD: 0dd024bb3770154e2490ba99e254c3f5fa4acd93
        with:
          script: |
            const runUrl = `${context.serverUrl}/${context.repo.owner}/${context.repo.repo}/actions/runs/${context.runId}`;
            const passed = process.env.SUITE_RC === '0';
            const body = [
              '## Complete P2P suite validation',
              '',
              `- PR head validated: \`${process.env.PR_HEAD}\``,
              `- Workflow run: ${runUrl}`,
              `- Command: \`cargo test --locked -p pulsedag-p2p --lib\``,
              `- Result: **${passed ? 'PASS' : 'FAIL'}**`,
              '',
              'This validation branch differs from the PR head only by this reporting workflow.'
            ].join('\n');
            await github.rest.issues.createComment({
              owner: context.repo.owner,
              repo: context.repo.repo,
              issue_number: 767,
              body
            });

      - name: Enforce complete P2P suite
        if: always()
        shell: bash
        run: test "${P2P_SUITE_RC:-1}" -eq 0
