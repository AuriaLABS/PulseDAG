name: apply-mempool-runtime-nounset-fix

on:
  push:
    branches:
      - agent/fix-mempool-runtime-nounset

permissions:
  contents: write

jobs:
  apply-fix:
    runs-on: ubuntu-latest
    timeout-minutes: 10
    steps:
      - uses: actions/checkout@v4
        with:
          ref: agent/fix-mempool-runtime-nounset
          fetch-depth: 0

      - name: Apply exact nounset fix
        run: |
          set -euo pipefail
          python3 - <<'PY'
          from pathlib import Path
          import re

          path = Path("scripts/v2_3_0_mempool_tx_relay_evidence.sh")
          text = path.read_text()

          pattern = re.compile(
              r'^start_node\(\)\{ local i="\$1" boot="\$2" data="\$OUT_DIR/data/n\$i";.*?NODE_PIDS\+=\("\$!"\); \}$',
              re.MULTILINE,
          )
          replacement = '''start_node() {
            local i="$1"
            local boot="$2"
            local data="$OUT_DIR/data/n$i"
            local args=(
              "$NODE_BIN"
              --network private
              --rpc-listen "127.0.0.1:$((BASE_RPC_PORT+i))"
              --p2p-listen "/ip4/127.0.0.1/tcp/$((BASE_P2P_PORT+i))"
            )
            [[ -n "$boot" ]] && args+=(--bootnode "$boot")
            mkdir -p "$data"
            log "start n$i ${args[*]}"
            PULSEDAG_CHAIN_ID="$CHAIN_ID" \\
            PULSEDAG_ROCKSDB_PATH="$data/rocksdb" \\
            PULSEDAG_API_PROFILE=local_dev \\
            PULSEDAG_P2P_MODE=libp2p-real \\
            PULSEDAG_P2P_MDNS=false \\
            PULSEDAG_P2P_KADEMLIA=true \\
            PULSEDAG_MEMPOOL_MAX_TRANSACTIONS="$REHEARSAL_MEMPOOL_CAPACITY" \\
            RUST_LOG="pulsedagd=info,pulsedag_p2p=info" \\
            RUST_LOG_STYLE=never \\
              "${args[@]}" > "$OUT_DIR/logs/n$i.log" 2>&1 &
            NODE_PIDS+=("$!")
          }'''
          text, count = pattern.subn(replacement, text, count=1)
          if count != 1:
              raise SystemExit(f"expected one start_node replacement, got {count}")

          marker = '  jq -n --arg result "$result"'
          insert = '''  local failures_json="[]"
            if ((${#FAILURES[@]})); then
              failures_json="$(printf '%s\\n' "${FAILURES[@]}" | jq -R . | jq -s .)"
            fi
            jq -n --arg result "$result"'''
          if marker not in text:
              raise SystemExit("write_manifest jq marker missing")
          text = text.replace(marker, insert, 1)

          old_failures = '    --argjson failures "$(printf \'%s\\n\' "${FAILURES[@]:-}" | jq -R . | jq -s .)" \\\n'
          new_failures = '    --argjson failures "$failures_json" \\\n'
          if old_failures not in text:
              raise SystemExit("old failure_reasons serialization missing")
          text = text.replace(old_failures, new_failures, 1)

          path.write_text(text)
          PY

          bash -n scripts/v2_3_0_mempool_tx_relay_evidence.sh
          ! grep -F 'local i="$1" boot="$2" data="$OUT_DIR/data/n$i"' scripts/v2_3_0_mempool_tx_relay_evidence.sh
          grep -F 'local data="$OUT_DIR/data/n$i"' scripts/v2_3_0_mempool_tx_relay_evidence.sh
          grep -F -- '--argjson failures "$failures_json"' scripts/v2_3_0_mempool_tx_relay_evidence.sh

      - name: Commit validated fix and remove one-shot workflow
        run: |
          set -euo pipefail
          rm .github/workflows/apply_mempool_nounset_fix.yml
          git config user.name "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"
          git add scripts/v2_3_0_mempool_tx_relay_evidence.sh .github/workflows/apply_mempool_nounset_fix.yml
          git commit -m "Fix nounset failure in mempool runtime driver"
          git push origin HEAD:agent/fix-mempool-runtime-nounset
