name: Publish approved v2.3.0 release

on:
  push:
    branches:
      - main
    paths:
      - .github/workflows/publish-v2.3.0.yml

permissions:
  actions: read
  contents: write
  issues: write

concurrency:
  group: publish-v2.3.0
  cancel-in-progress: false

env:
  TAG: v2.3.0
  CANDIDATE_SHA: 7e43225f01ac05d15e5f1e3f1550d7850bf18cbc
  CANDIDATE_RUN_ID: "29854712585"
  CANDIDATE_ARTIFACT: v2_3_0_candidate_consolidated_29854712585

jobs:
  publish:
    name: Verify authorization and publish binaries
    if: github.repository == 'AuriaLABS/PulseDAG'
    runs-on: ubuntu-latest
    env:
      GH_TOKEN: ${{ github.token }}
    steps:
      - name: Verify final authorization issue
        shell: bash
        run: |
          set -euo pipefail
          gh api "repos/${GITHUB_REPOSITORY}/issues/777" > issue-777.json
          python - <<'PY'
          import json
          import re

          issue = json.load(open("issue-777.json", encoding="utf-8"))
          body = issue.get("body") or ""
          if issue.get("state") != "closed":
              raise SystemExit("issue #777 is not closed")

          required = [
              "7e43225f01ac05d15e5f1e3f1550d7850bf18cbc",
              "29854712585",
              "sha256:7c56b92c8b1a1f3974473ba83380061cbf16129a223b909bef20976fc674ee02",
              "- [x] `APPROVE_TAG_AND_PUBLICATION`",
              "- [ ] `REQUEST_CHANGES`",
              "- [ ] `NO_GO`",
              "- `public_testnet_ready=false` remains unchanged.",
              "- `thirty_day_public_testnet_clock_started=false` remains unchanged.",
          ]
          for value in required:
              if value not in body:
                  raise SystemExit(f"missing authorization evidence: {value}")

          fields = {
              "release rollback owner": r"- \[x\] Release rollback owner: `([^`]+)`",
              "operations owner": r"- \[x\] Operations owner: `([^`]+)`",
              "maintainer": r"- \[x\] Maintainer: `([^`]+)`",
              "decision date": r"- \[x\] Decision date \(UTC\): `([^`]+)`",
          }
          for label, pattern in fields.items():
              match = re.search(pattern, body)
              if not match or not match.group(1).strip() or "___" in match.group(1):
                  raise SystemExit(f"missing completed {label}")
          PY

      - name: Download exact consolidated candidate
        shell: bash
        run: |
          set -euo pipefail
          mkdir -p dist
          gh run download "${CANDIDATE_RUN_ID}" \
            --repo "${GITHUB_REPOSITORY}" \
            --name "${CANDIDATE_ARTIFACT}" \
            --dir dist

      - name: Verify candidate checksums and provenance
        shell: bash
        run: |
          set -euo pipefail
          test -f dist/SHA256SUMS.txt
          test -f dist/INSTALL-VERIFY.md
          test -f dist/release-candidate-provenance.json

          archive_count=$(find dist -maxdepth 1 -type f \( -name '*.tar.gz' -o -name '*.zip' \) | wc -l)
          test "${archive_count}" -eq 6

          (
            cd dist
            sha256sum -c SHA256SUMS.txt
            for checksum in *.sha256; do
              sha256sum -c "${checksum}"
            done
          )

          python - <<'PY'
          import hashlib
          import json
          from pathlib import Path

          root = Path("dist")
          provenance = json.loads((root / "release-candidate-provenance.json").read_text())
          expected_sha = "7e43225f01ac05d15e5f1e3f1550d7850bf18cbc"
          expected_run = "29854712585"

          assert provenance["candidate_sha"] == expected_sha
          assert provenance["release_tag"] == "v2.3.0"
          assert provenance["artifact_count"] == 6
          assert provenance["native_smoke_verified"] is True
          assert provenance["public_testnet_ready"] is False
          assert provenance["thirty_day_public_testnet_clock_started"] is False

          records = provenance["artifacts"]
          assert len(records) == 6
          for record in records:
              archive = root / record["archive"]
              assert archive.is_file(), archive
              assert hashlib.sha256(archive.read_bytes()).hexdigest() == record["archive_sha256"]
              assert record["tag"] == "v2.3.0"
              assert record["provenance"]["commit"] == expected_sha
              assert str(record["provenance"]["github_run_id"]) == expected_run
              manifest = root / f'{record["archive"]}.json'
              assert manifest.is_file(), manifest
              assert json.loads(manifest.read_text()) == record
          PY

      - name: Reconcile exact tag and release state
        id: release_state
        shell: bash
        run: |
          set -euo pipefail

          release_exists=false
          if gh release view "${TAG}" --repo "${GITHUB_REPOSITORY}" >/dev/null 2>&1; then
            release_exists=true
          fi

          tag_exists=false
          tag_sha=""
          if gh api "repos/${GITHUB_REPOSITORY}/git/ref/tags/${TAG}" > existing-tag.json 2>/dev/null; then
            tag_exists=true
            tag_type=$(jq -r '.object.type' existing-tag.json)
            tag_sha=$(jq -r '.object.sha' existing-tag.json)
            if [ "${tag_type}" = "tag" ]; then
              tag_sha=$(gh api "repos/${GITHUB_REPOSITORY}/git/tags/${tag_sha}" --jq '.object.sha')
            fi
          fi

          if [ "${tag_exists}" = true ] && [ "${tag_sha}" != "${CANDIDATE_SHA}" ]; then
            if [ "${release_exists}" = true ]; then
              echo "Refusing to move ${TAG}: a published release already exists and the tag points to ${tag_sha}." >&2
              exit 1
            fi

            echo "Repairing unpublished stale tag ${TAG}: ${tag_sha} -> ${CANDIDATE_SHA}"
            gh api --method PATCH \
              "repos/${GITHUB_REPOSITORY}/git/refs/tags/${TAG}" \
              -f sha="${CANDIDATE_SHA}" \
              -F force=true >/dev/null
          fi

          if gh api "repos/${GITHUB_REPOSITORY}/git/ref/tags/${TAG}" > verified-tag.json 2>/dev/null; then
            verified_type=$(jq -r '.object.type' verified-tag.json)
            verified_sha=$(jq -r '.object.sha' verified-tag.json)
            if [ "${verified_type}" = "tag" ]; then
              verified_sha=$(gh api "repos/${GITHUB_REPOSITORY}/git/tags/${verified_sha}" --jq '.object.sha')
            fi
            test "${verified_sha}" = "${CANDIDATE_SHA}"
          fi

          echo "exists=${release_exists}" >> "${GITHUB_OUTPUT}"

      - name: Build release notes
        shell: bash
        run: |
          cat > release-notes.md <<'EOF'
          # PulseDAG v2.3.0

          This is the approved **private-testnet release** of PulseDAG v2.3.0.

          ## Verified release identity

          - Exact source candidate: `7e43225f01ac05d15e5f1e3f1550d7850bf18cbc`
          - Exact-candidate workflow: `29854712585`
          - Consolidated workflow artifact SHA-256: `7c56b92c8b1a1f3974473ba83380061cbf16129a223b909bef20976fc674ee02`
          - Final authorization: issue #777 — `APPROVE_TAG_AND_PUBLICATION`
          - Technical closeout: PR #776

          ## Downloads

          Native `pulsedagd` node and standalone `pulsedag-miner` archives are provided for:

          - Linux x86_64 GNU
          - Windows x86_64 MSVC
          - macOS x86_64 Intel

          Each archive is accompanied by an individual SHA-256 file and provenance manifest. Use `SHA256SUMS.txt` and `INSTALL-VERIFY.md` to verify and install the binaries.

          ## Scope boundary

          This release does **not** authorize a public-testnet launch or smart contracts.

          - `public_testnet_ready=false`
          - `thirty_day_public_testnet_clock_started=false`
          - The 30-day clock begins only at the first separately authorized public-testnet launch.
          EOF

      - name: Create release and upload verified assets
        if: steps.release_state.outputs.exists != 'true'
        shell: bash
        run: |
          set -euo pipefail
          gh release create "${TAG}" dist/* \
            --repo "${GITHUB_REPOSITORY}" \
            --target "${CANDIDATE_SHA}" \
            --title "PulseDAG v2.3.0" \
            --notes-file release-notes.md

      - name: Reconcile assets on existing release
        if: steps.release_state.outputs.exists == 'true'
        shell: bash
        run: |
          set -euo pipefail
          gh release upload "${TAG}" dist/* \
            --repo "${GITHUB_REPOSITORY}" \
            --clobber

      - name: Verify published release
        shell: bash
        run: |
          set -euo pipefail
          gh release view "${TAG}" \
            --repo "${GITHUB_REPOSITORY}" \
            --json tagName,isDraft,isPrerelease,assets,url > published-release.json
          gh api "repos/${GITHUB_REPOSITORY}/git/ref/tags/${TAG}" > published-tag.json

          python - <<'PY'
          import json
          from pathlib import Path

          release = json.loads(Path("published-release.json").read_text())
          tag = json.loads(Path("published-tag.json").read_text())
          expected_assets = sorted(path.name for path in Path("dist").iterdir() if path.is_file())
          actual_assets = sorted(asset["name"] for asset in release["assets"])

          assert release["tagName"] == "v2.3.0"
          assert release["isDraft"] is False
          assert release["isPrerelease"] is False
          assert actual_assets == expected_assets, (actual_assets, expected_assets)
          assert tag["object"]["type"] == "commit"
          assert tag["object"]["sha"] == "7e43225f01ac05d15e5f1e3f1550d7850bf18cbc"
          print(release["url"])
          PY

      - name: Record successful publication in issue 777
        shell: bash
        run: |
          set -euo pipefail
          python - <<'PY'
          import json
          import os
          import textwrap
          from pathlib import Path

          release = json.loads(Path("published-release.json").read_text())
          body = textwrap.dedent(f"""\
          <!-- pulsedag-v2.3.0-release-publication -->
          ## PulseDAG v2.3.0 published

          The approved private-testnet release has been published and independently rechecked by workflow run `{os.environ['GITHUB_RUN_ID']}`.

          - Release: {release['url']}
          - Tag: `v2.3.0`
          - Exact candidate: `7e43225f01ac05d15e5f1e3f1550d7850bf18cbc`
          - Candidate workflow: `29854712585`
          - Published assets: `{len(release['assets'])}`
          - Aggregate candidate artifact digest: `sha256:7c56b92c8b1a1f3974473ba83380061cbf16129a223b909bef20976fc674ee02`
          - Publication workflow: {os.environ['GITHUB_SERVER_URL']}/{os.environ['GITHUB_REPOSITORY']}/actions/runs/{os.environ['GITHUB_RUN_ID']}

          Safety boundary remains unchanged: `public_testnet_ready=false` and `thirty_day_public_testnet_clock_started=false`.
          """)
          Path("release-confirmation.md").write_text(body, encoding="utf-8")
          PY

          marker='<!-- pulsedag-v2.3.0-release-publication -->'
          existing_id=$(gh api "repos/${GITHUB_REPOSITORY}/issues/777/comments?per_page=100" \
            --jq ".[] | select(.body | contains(\"${marker}\")) | .id" | tail -n 1)
          if [ -n "${existing_id}" ]; then
            gh api --method PATCH "repos/${GITHUB_REPOSITORY}/issues/comments/${existing_id}" \
              -f body="$(cat release-confirmation.md)" >/dev/null
          else
            gh api --method POST "repos/${GITHUB_REPOSITORY}/issues/777/comments" \
              -f body="$(cat release-confirmation.md)" >/dev/null
          fi

          failure_marker='<!-- pulsedag-v2.3.0-release-publication-failure -->'
          failure_id=$(gh api "repos/${GITHUB_REPOSITORY}/issues/777/comments?per_page=100" \
            --jq ".[] | select(.body | contains(\"${failure_marker}\")) | .id" | tail -n 1)
          if [ -n "${failure_id}" ]; then
            gh api --method PATCH "repos/${GITHUB_REPOSITORY}/issues/comments/${failure_id}" \
              -f body="${failure_marker}
          ## Previous publication attempt resolved

          The earlier failed attempt was superseded by successful workflow run ${GITHUB_RUN_ID}." >/dev/null
          fi

      - name: Record publication failure in issue 777
        if: failure()
        continue-on-error: true
        shell: bash
        run: |
          python - <<'PY'
          import os
          import textwrap
          from pathlib import Path

          body = textwrap.dedent(f"""\
          <!-- pulsedag-v2.3.0-release-publication-failure -->
          ## PulseDAG v2.3.0 publication failed

          Publication workflow `{os.environ['GITHUB_RUN_ID']}` did not complete successfully.

          Review: {os.environ['GITHUB_SERVER_URL']}/{os.environ['GITHUB_REPOSITORY']}/actions/runs/{os.environ['GITHUB_RUN_ID']}

          No public-testnet authorization is implied or changed.
          """)
          Path("release-failure.md").write_text(body, encoding="utf-8")
          PY

          marker='<!-- pulsedag-v2.3.0-release-publication-failure -->'
          existing_id=$(gh api "repos/${GITHUB_REPOSITORY}/issues/777/comments?per_page=100" \
            --jq ".[] | select(.body | contains(\"${marker}\")) | .id" | tail -n 1)
          if [ -n "${existing_id}" ]; then
            gh api --method PATCH "repos/${GITHUB_REPOSITORY}/issues/comments/${existing_id}" \
              -f body="$(cat release-failure.md)" >/dev/null
          else
            gh api --method POST "repos/${GITHUB_REPOSITORY}/issues/777/comments" \
              -f body="$(cat release-failure.md)" >/dev/null
          fi
