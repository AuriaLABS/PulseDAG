name: Apply PR 755 bounded prune miner retry

on:
  pull_request:
    branches:
      - main
    paths:
      - .github/patches/pr755_prune_429_retry.patch
      - .github/workflows/pr755_apply_prune_429_retry.yml

permissions:
  contents: write

concurrency:
  group: pr755-bounded-prune-miner-retry
  cancel-in-progress: true

jobs:
  apply-and-validate:
    runs-on: ubuntu-24.04
    steps:
      - uses: actions/checkout@v4
        with:
          ref: agent/fix-selected-segment-durability-closeout
          fetch-depth: 0
      - uses: Swatinem/rust-cache@v2
      - name: Apply exact harness edit
        shell: bash
        run: |
          set -euo pipefail
          python3 - <<'PY'
          from pathlib import Path

          path = Path('scripts/lib/v2_3_0_prune_restart_rejoin_harness.sh')
          text = path.read_text()

          if 'v2_3_0_prune_miner_retryable_log()' not in text:
              anchor = '# fail-closed driver and intentionally remains separate from the Task 03 harness.\n\n'
              helper = (
                  'v2_3_0_prune_miner_retryable_log() {\n'
                  '  local log_file="${1:?missing miner log path}"\n'
                  "  grep -q '429 Too Many Requests' \"$log_file\"\n"
                  '}\n\n'
              )
              if text.count(anchor) != 1:
                  raise SystemExit('unexpected helper insertion anchor')
              text = text.replace(anchor, anchor + helper, 1)

          if 'V2_3_0_MINER_429_MAX_ATTEMPTS' not in text:
              start = text.index('  _v230_mine_block(){\n')
              deadline = text.index('    deadline=$(( $(date +%s) + 60 ))\n', start)
              deadline_end = deadline + len('    deadline=$(( $(date +%s) + 60 ))\n')
              replacement = (
                  '  _v230_mine_block(){\n'
                  '    local label="$1" before after deadline latest attempt max_attempts retry_wait miner_log mined=0\n'
                  '    before="$(_v230_height 1)"\n'
                  '    max_attempts="${V2_3_0_MINER_429_MAX_ATTEMPTS:-20}"\n'
                  '    retry_wait="${V2_3_0_MINER_429_RETRY_WAIT_SECS:-3}"\n'
                  '    [[ "$max_attempts" =~ ^[0-9]+$ && "$max_attempts" -ge 1 ]] || { echo "V2_3_0_MINER_429_MAX_ATTEMPTS must be at least 1" >&2; return 1; }\n'
                  '    [[ "$retry_wait" =~ ^[0-9]+$ && "$retry_wait" -ge 1 ]] || { echo "V2_3_0_MINER_429_RETRY_WAIT_SECS must be at least 1" >&2; return 1; }\n'
                  '    miner_log="$miner_dir/$label.log"\n'
                  '    : > "$miner_log"\n'
                  '    for ((attempt=1; attempt<=max_attempts; attempt++)); do\n'
                  "      printf '\\n[%s] miner attempt %d/%d\\n' \"$(date -u +%FT%TZ)\" \"$attempt\" \"$max_attempts\" >> \"$miner_log\"\n"
                  '      if "$miner_bin" --node "$(_v230_rpc_url 1)" --miner-address "v230-task04-$label" --max-tries 1000000 >> "$miner_log" 2>&1; then\n'
                  '        mined=1\n'
                  '        break\n'
                  '      fi\n'
                  '      if v2_3_0_prune_miner_retryable_log "$miner_log"; then\n'
                  '        _v230_prune_log "mining submit rate limited for $label attempt=$attempt/$max_attempts; retrying after ${retry_wait}s"\n'
                  '        sleep "$retry_wait"\n'
                  '        continue\n'
                  '      fi\n'
                  '      tail -80 "$miner_log" >&2 || true\n'
                  '      return 1\n'
                  '    done\n'
                  '    (( mined == 1 )) || {\n'
                  '      echo "external miner remained rate limited for $label after $max_attempts attempts" >&2\n'
                  '      tail -80 "$miner_log" >&2 || true\n'
                  '      return 1\n'
                  '    }\n'
                  '    deadline=$(( $(date +%s) + 60 ))\n'
              )
              text = text[:start] + replacement + text[deadline_end:]

          path.write_text(text)
          PY
      - name: Validate bounded retry semantics
        shell: bash
        run: |
          set -euo pipefail
          bash -n scripts/lib/v2_3_0_prune_restart_rejoin_harness.sh
          source scripts/lib/v2_3_0_prune_restart_rejoin_harness.sh
          retry_log="$(mktemp)"
          fatal_log="$(mktemp)"
          trap 'rm -f "$retry_log" "$fatal_log"' EXIT
          printf 'HTTP status client error (429 Too Many Requests)\n' > "$retry_log"
          printf 'state root mismatch\n' > "$fatal_log"
          v2_3_0_prune_miner_retryable_log "$retry_log"
          if v2_3_0_prune_miner_retryable_log "$fatal_log"; then
            echo 'non-429 failure was incorrectly classified as retryable' >&2
            exit 1
          fi
          grep -q 'V2_3_0_MINER_429_MAX_ATTEMPTS:-20' scripts/lib/v2_3_0_prune_restart_rejoin_harness.sh
          grep -q 'V2_3_0_MINER_429_RETRY_WAIT_SECS:-3' scripts/lib/v2_3_0_prune_restart_rejoin_harness.sh
          grep -q 'minimum offline advance must be at least 64' scripts/lib/v2_3_0_prune_restart_rejoin_harness.sh
          grep -q 'offline_advance >= min_offline' scripts/lib/v2_3_0_prune_restart_rejoin_harness.sh
      - name: Run compact-prune regression
        shell: bash
        run: |
          set -euo pipefail
          cargo test --locked -p pulsedag-storage compact_prune_97_to_24_restarts_with_identical_tip_and_state_root
      - name: Publish validated harness fix
        shell: bash
        run: |
          set -euo pipefail
          if git diff --quiet; then
            echo 'Bounded prune miner retry already published'
            exit 0
          fi
          git config user.name "chatgpt-codex-connector[bot]"
          git config user.email "199175422+chatgpt-codex-connector[bot]@users.noreply.github.com"
          git add scripts/lib/v2_3_0_prune_restart_rejoin_harness.sh
          git commit -m "ci: retry transient prune miner rate limits"
          git pull --rebase origin agent/fix-selected-segment-durability-closeout
          git push origin HEAD:agent/fix-selected-segment-durability-closeout
