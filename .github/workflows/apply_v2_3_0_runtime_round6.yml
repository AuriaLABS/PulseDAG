name: Apply v2.3.0 runtime round-6 fixes

on:
  pull_request:
    branches:
      - main

permissions:
  contents: write

concurrency:
  group: apply-v2-3-0-runtime-round6-${{ github.sha }}
  cancel-in-progress: true

jobs:
  apply-and-validate:
    if: github.actor != 'github-actions[bot]'
    runs-on: ubuntu-24.04
    timeout-minutes: 120
    steps:
      - name: Checkout patch branch
        uses: actions/checkout@v4
        with:
          ref: agent/fix-v2-3-0-runtime-closeout-round-6
          fetch-depth: 0

      - name: Install Rust
        uses: dtolnay/rust-toolchain@stable
        with:
          components: rustfmt,clippy

      - name: Cache cargo
        uses: Swatinem/rust-cache@v2

      - name: Apply fail-closed source patch
        id: apply
        continue-on-error: true
        run: |
          set +e
          patcher="scripts/lib/apply_runtime_round6.py"
          base64 -d scripts/lib/runtime_round6_patch.py.gz.b64 | gzip -d > "$patcher"
          decode_rc=$?
          if (( decode_rc != 0 )); then
            echo "failed decoding runtime round-6 patcher rc=$decode_rc" > /tmp/runtime-round6-apply.log
            echo "$decode_rc" > /tmp/runtime-round6-apply.rc
            cat /tmp/runtime-round6-apply.log
            exit "$decode_rc"
          fi
          python3 -m py_compile "$patcher" > /tmp/runtime-round6-apply.log 2>&1
          compile_rc=$?
          if (( compile_rc != 0 )); then
            echo "$compile_rc" > /tmp/runtime-round6-apply.rc
            cat /tmp/runtime-round6-apply.log
            exit "$compile_rc"
          fi
          python3 "$patcher" >> /tmp/runtime-round6-apply.log 2>&1
          rc=$?
          echo "$rc" > /tmp/runtime-round6-apply.rc
          cat /tmp/runtime-round6-apply.log
          exit "$rc"

      - name: Upload patch diagnostics
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: runtime-round6-apply-${{ github.run_id }}
          path: |
            /tmp/runtime-round6-apply.log
            /tmp/runtime-round6-apply.rc
            scripts/lib/apply_runtime_round6.py
          if-no-files-found: error
          retention-days: 7

      - name: Require patch application
        run: |
          set -euo pipefail
          test -s /tmp/runtime-round6-apply.rc
          test "$(cat /tmp/runtime-round6-apply.rc)" = 0

      - name: Format and validate source
        run: |
          set -euo pipefail
          cargo fmt --all
          cargo fmt --all -- --check
          bash -n scripts/lib/v2_3_0_runtime_harness.sh
          bash -n scripts/lib/v2_3_0_prune_restart_rejoin_harness.sh
          bash -n scripts/tests/test_v2_3_0_lag_runtime_driver.sh
          bash -n scripts/tests/test_v2_3_0_prune_runtime_driver_semantics.sh
          git diff --check

      - name: Verify selected-segment closeout regressions
        run: |
          set -euo pipefail
          cargo test -p pulsedagd selected_segment --locked -- --nocapture
          bash scripts/tests/test_v2_3_0_lag_runtime_driver.sh

      - name: Verify Task 04 evidence contract
        run: |
          set -euo pipefail
          bash scripts/tests/test_v2_3_0_prune_runtime_driver_semantics.sh

      - name: Verify node compiles cleanly
        run: |
          set -euo pipefail
          cargo check -p pulsedagd --locked
          cargo clippy -p pulsedagd --all-targets --locked -- -D warnings

      - name: Publish validated source commit
        run: |
          set -euo pipefail
          git config user.name github-actions[bot]
          git config user.email 41898282+github-actions[bot]@users.noreply.github.com
          git add \
            apps/pulsedagd/src/main.rs \
            scripts/lib/v2_3_0_runtime_harness.sh \
            scripts/lib/v2_3_0_prune_restart_rejoin_harness.sh \
            scripts/tests/test_v2_3_0_lag_runtime_driver.sh \
            scripts/tests/test_v2_3_0_prune_runtime_driver_semantics.sh \
            scripts/tests/test_v2_3_0_selected_segment_source_semantics.py
          git diff --cached --check
          git commit -m 'Complete selected-segment and prune runtime evidence paths'
          git push origin HEAD:agent/fix-v2-3-0-runtime-closeout-round-6
