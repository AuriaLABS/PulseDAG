name: Apply PR 755 rustfmt

on:
  pull_request:
    branches:
      - main

permissions:
  contents: write

jobs:
  format:
    runs-on: ubuntu-24.04
    steps:
      - uses: actions/checkout@v4
        with:
          ref: agent/fix-selected-segment-durability-closeout
          fetch-depth: 0
      - uses: dtolnay/rust-toolchain@stable
        with:
          components: rustfmt
      - name: Apply rustfmt and publish
        shell: bash
        run: |
          set -euo pipefail
          cargo fmt --all
          if git diff --quiet; then
            echo "No formatting changes required"
            exit 0
          fi
          git config user.name "chatgpt-codex-connector[bot]"
          git config user.email "199175422+chatgpt-codex-connector[bot]@users.noreply.github.com"
          git add '*.rs'
          git commit -m "style: apply rustfmt to closeout fixes"
          git push origin HEAD:agent/fix-selected-segment-durability-closeout
