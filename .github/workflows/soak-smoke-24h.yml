name: Soak Smoke (short CI signal)

on:
  workflow_dispatch:

jobs:
  soak-smoke:
    runs-on: ubuntu-latest

    steps:
      - uses: actions/checkout@v4
      - uses: dtolnay/rust-toolchain@stable

      - name: Build
        run: cargo build --workspace

      - name: Start node
        run: |
          nohup cargo run -p pulsedagd > node.log 2>&1 &
          for i in {1..30}; do
            if curl -sSf http://127.0.0.1:8080/health > /dev/null; then
              echo "Node is healthy"
              exit 0
            fi
            sleep 2
          done
          echo "Node failed to become healthy in time"
          exit 1

      - name: Start miner
        run: |
          nohup cargo run -p pulsedag-miner -- \
            --node http://127.0.0.1:8080 \
            --miner-address test \
            --loop > miner.log 2>&1 &

      - name: Short soak health loop (~150s)
        run: |
          for i in {1..30}
          do
            echo "Iteration $i"
            curl -sSf http://127.0.0.1:8080/status > /dev/null
            sleep 5
          done

      - name: Upload short-soak logs
        uses: actions/upload-artifact@v4
        with:
          name: short-soak-logs
          path: |
            node.log
            miner.log
