name: Burn-in Simulated

on:
  workflow_dispatch:

jobs:
  burnin:
    runs-on: ubuntu-latest

    steps:
      - uses: actions/checkout@v4
      - uses: dtolnay/rust-toolchain@stable

      - name: Build
        run: cargo build --workspace

      - name: Start node
        run: |
          nohup cargo run -p pulsedagd > node.log 2>&1 &
          sleep 5

      - name: Start miner
        run: |
          nohup cargo run -p pulsedag-miner -- \
            --node http://127.0.0.1:8080 \
            --miner-address test \
            --loop > miner.log 2>&1 &

      - name: Burn-in loop
        run: |
          for i in {1..30}
          do
            echo "Iteration $i"
            curl -s http://127.0.0.1:8080/status
            sleep 5
          done

      - name: Upload logs
        uses: actions/upload-artifact@v4
        with:
          name: burnin-logs
          path: |
            node.log
            miner.log
