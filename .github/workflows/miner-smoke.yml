name: Miner Smoke Test

on:
  workflow_dispatch:

jobs:
  miner:
    runs-on: ubuntu-latest

    steps:
      - uses: actions/checkout@v4
      - uses: dtolnay/rust-toolchain@stable

      - name: Build
        run: cargo build --workspace

      - name: Run node
        run: |
          nohup cargo run -p pulsedagd > node.log 2>&1 &
          sleep 5

      - name: Run miner
        run: |
          cargo run -p pulsedag-miner -- \
            --node http://127.0.0.1:8080 \
            --miner-address test \
            --max-tries 10000
