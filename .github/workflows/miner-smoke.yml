name: Miner Smoke Test

on:
  workflow_dispatch:

jobs:
  miner:
    runs-on: ubuntu-latest

    steps:
      - uses: actions/checkout@v4
      - uses: dtolnay/rust-toolchain@stable

      - name: Build
        run: cargo build --workspace

      - name: Run node
        run: |
          nohup cargo run -p pulsedagd > node.log 2>&1 &
          for i in {1..30}; do
            if curl -sSf http://127.0.0.1:8080/health > /dev/null; then
              echo "Node is healthy"
              exit 0
            fi
            sleep 2
          done
          echo "Node failed to become healthy in time"
          exit 1

      - name: Run miner
        run: |
          cargo run -p pulsedag-miner -- \
            --node http://127.0.0.1:8080 \
            --miner-address test \
            --max-tries 10000
