name: PR 755 runtime closeout

on:
  pull_request:
    branches:
      - main

permissions:
  contents: write

concurrency:
  group: pr-755-runtime-closeout-de2861e08373920c2b33076cfaff3f94b6dea153
  cancel-in-progress: false

env:
  CANDIDATE_SHA: de2861e08373920c2b33076cfaff3f94b6dea153

jobs:
  source-snapshot:
    name: Capture PR source tree
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
        with:
          ref: ${{ github.event.pull_request.head.sha }}
          fetch-depth: 1
      - name: Archive source tree
        shell: bash
        run: |
          set -euo pipefail
          git archive --format=tar.gz --output=pulsedag-pr755-source.tar.gz HEAD
      - name: Upload source tree
        uses: actions/upload-artifact@v4
        with:
          name: pulsedag-pr755-source-${{ github.event.pull_request.head.sha }}
          path: pulsedag-pr755-source.tar.gz
          if-no-files-found: error
          retention-days: 7

  workspace:
    uses: ./.github/workflows/v2_3_0_workspace_validation.yml
    with:
      candidate_sha: de2861e08373920c2b33076cfaff3f94b6dea153
      test_compile_timeout_minutes: '30'
      package_test_timeout_minutes: '10'
      p2p_real_runtime_test_timeout_seconds: '120'
      test_threads: '1'
      check_timeout_minutes: '20'
      clippy_timeout_minutes: '30'

  staged-network:
    needs: workspace
    uses: ./.github/workflows/v2_3_0_staged_network_gate.yml
    with:
      candidate_sha: de2861e08373920c2b33076cfaff3f94b6dea153
      duration_secs: '600'
      quiescence_wait_secs: '180'

  mempool-relay:
    needs: workspace
    uses: ./.github/workflows/v2_3_0_mempool_tx_relay_gate.yml
    with:
      candidate_sha: de2861e08373920c2b33076cfaff3f94b6dea153
      evidence_mode: runtime-closeout

  lag-injection:
    needs: workspace
    uses: ./.github/workflows/v2_3_0_lag_injection_gate.yml
    with:
      candidate_sha: de2861e08373920c2b33076cfaff3f94b6dea153
      evidence_mode: runtime-closeout
      min_selected_gap: '96'

  prune-restart-rejoin:
    needs: workspace
    uses: ./.github/workflows/v2_3_0_prune_restart_rejoin_gate.yml
    with:
      candidate_sha: de2861e08373920c2b33076cfaff3f94b6dea153
      evidence_mode: runtime-closeout

  final-decision:
    name: Candidate gate decision
    if: always()
    needs:
      - workspace
      - staged-network
      - mempool-relay
      - lag-injection
      - prune-restart-rejoin
    runs-on: ubuntu-24.04
    steps:
      - name: Create candidate result manifest
        shell: bash
        env:
          WORKSPACE_RESULT: ${{ needs.workspace.result }}
          STAGED_RESULT: ${{ needs.staged-network.result }}
          MEMPOOL_RESULT: ${{ needs.mempool-relay.result }}
          LAG_RESULT: ${{ needs.lag-injection.result }}
          PRUNE_RESULT: ${{ needs.prune-restart-rejoin.result }}
        run: |
          set -euo pipefail
          mkdir -p ci-evidence/candidate-decision
          python3 - <<'PY'
          import json, os, pathlib
          results = {
            'workspace': os.environ['WORKSPACE_RESULT'],
            'staged_network_1m_2m_4m': os.environ['STAGED_RESULT'],
            'mempool_transaction_relay': os.environ['MEMPOOL_RESULT'],
            'selected_segment_lag_injection': os.environ['LAG_RESULT'],
            'prune_restart_rejoin': os.environ['PRUNE_RESULT'],
          }
          passed = all(value == 'success' for value in results.values())
          manifest = {
            'gate': 'v2.3.0-candidate-closeout',
            'requested_candidate': 'de2861e08373920c2b33076cfaff3f94b6dea153',
            'mode': 'runtime-closeout',
            'results': results,
            'result': 'PASS' if passed else 'FAIL',
            'closeout_eligible': passed,
            'decision': 'GO_TO_START_V2_3_0_REVIEW' if passed else 'NO_GO',
            'public_testnet_ready': False,
            'thirty_day_public_testnet_clock_started': False,
          }
          pathlib.Path('ci-evidence/candidate-decision/evidence_manifest.json').write_text(
              json.dumps(manifest, indent=2) + '\n'
          )
          PY
          sha256sum ci-evidence/candidate-decision/evidence_manifest.json > ci-evidence/candidate-decision/SHA256SUMS

      - name: Upload candidate decision
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: v2_3_0_pr755_candidate_decision_${{ github.run_id }}
          path: ci-evidence/candidate-decision
          if-no-files-found: error
          retention-days: 90

      - name: Enforce candidate decision
        run: |
          set -euo pipefail
          jq -e '.result == "PASS" and .closeout_eligible == true and .decision == "GO_TO_START_V2_3_0_REVIEW"' \
            ci-evidence/candidate-decision/evidence_manifest.json >/dev/null

  cleanup-trigger:
    name: Remove temporary runtime trigger
    if: always()
    needs: final-decision
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
        with:
          ref: agent/fix-selected-segment-durability-closeout
          fetch-depth: 0
      - name: Remove trigger from branch
        shell: bash
        run: |
          set -euo pipefail
          git config user.name "chatgpt-codex-connector[bot]"
          git config user.email "199175422+chatgpt-codex-connector[bot]@users.noreply.github.com"
          git rm --ignore-unmatch .github/workflows/v2_3_0_pr755_runtime_closeout.yml
          if git diff --cached --quiet; then
            exit 0
          fi
          git commit -m "Remove temporary PR 755 runtime closeout trigger"
          git push origin HEAD:agent/fix-selected-segment-durability-closeout
