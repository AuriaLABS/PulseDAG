name: PR 755 source snapshot

on:
  pull_request:
    branches:
      - main

permissions:
  contents: read

jobs:
  snapshot:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
        with:
          ref: ${{ github.event.pull_request.head.sha }}
          fetch-depth: 1
      - name: Archive source tree
        shell: bash
        run: |
          set -euo pipefail
          git archive --format=tar.gz --output=pulsedag-pr755-source.tar.gz HEAD
      - name: Upload source tree
        uses: actions/upload-artifact@v4
        with:
          name: pulsedag-pr755-source-${{ github.event.pull_request.head.sha }}
          path: pulsedag-pr755-source.tar.gz
          if-no-files-found: error
          retention-days: 7
