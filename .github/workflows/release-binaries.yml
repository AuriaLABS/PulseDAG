name: release-binaries

on:
  push:
    tags:
      - "v*"
  workflow_dispatch:

env:
  BIN_NAME: pulsedagd

jobs:
  build:
    name: Build ${{ matrix.name }}
    runs-on: ${{ matrix.os }}

    strategy:
      fail-fast: false
      matrix:
        include:
          - name: linux
            os: ubuntu-22.04
            output_name: pulsedagd-linux
            binary_path: target/release/pulsedagd

          - name: windows
            os: windows-2022
            output_name: pulsedagd-windows.exe
            binary_path: target/release/pulsedagd.exe

          - name: macos
            os: macos-13
            output_name: pulsedagd-macos
            binary_path: target/release/pulsedagd

    steps:
      - name: Checkout
        uses: actions/checkout@v3

      - name: Install Rust
        uses: dtolnay/rust-toolchain@stable

      - name: Cache cargo
        uses: Swatinem/rust-cache@v2

      - name: Show Rust version
        run: |
          rustc --version
          cargo --version

      - name: Build
        run: cargo build --release --locked --bin ${{ env.BIN_NAME }}

      - name: Pack artifact (Windows)
        if: runner.os == 'Windows'
        shell: pwsh
        run: |
          New-Item -ItemType Directory -Force dist | Out-Null
          Copy-Item "${{ matrix.binary_path }}" "dist/${{ matrix.output_name }}"

      - name: Pack artifact (Linux/macOS)
        if: runner.os != 'Windows'
        shell: bash
        run: |
          mkdir -p dist
          cp "${{ matrix.binary_path }}" "dist/${{ matrix.output_name }}"
          chmod +x "dist/${{ matrix.output_name }}"

      - name: Upload artifact
        uses: actions/upload-artifact@v3
        with:
          name: ${{ matrix.name }}
          path: dist/${{ matrix.output_name }}
          if-no-files-found: error

  publish:
    name: Publish Release
    needs: build
    runs-on: ubuntu-22.04
    permissions:
      contents: write

    steps:
      - name: Download artifacts
        uses: actions/download-artifact@v3
        with:
          path: artifacts

      - name: Flatten files
        shell: bash
        run: |
          mkdir -p final
          find artifacts -type f -exec cp {} final/ \;
          ls -lah final

      - name: Publish to GitHub Release
        env:
          GH_TOKEN: ${{ github.token }}
        shell: bash
        run: |
          gh release create "${{ github.ref_name }}" final/* --generate-notes || \
          gh release upload "${{ github.ref_name }}" final/* --clobber
