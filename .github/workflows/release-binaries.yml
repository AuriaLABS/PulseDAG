name: release-binaries

on:
  push:
    tags:
      - "v*"
  workflow_dispatch:
    inputs:
      tag:
        description: "Existing tag to publish (for example: v1.2.3)"
        required: true
        type: string

env:
  RELEASE_TAG: ${{ github.event_name == 'workflow_dispatch' && github.event.inputs.tag || github.ref_name }}

jobs:
  build:
    name: Build ${{ matrix.name }}
    runs-on: ${{ matrix.os }}
    permissions:
      contents: read
      id-token: write
      attestations: write

    strategy:
      fail-fast: false
      matrix:
        include:
          - name: linux-x86_64
            os: ubuntu-latest
            expected_target: x86_64-unknown-linux-gnu

          - name: windows-x86_64
            os: windows-latest
            expected_target: x86_64-pc-windows-msvc

          - name: macos-x86_64
            os: macos-latest
            expected_target: x86_64-apple-darwin

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Install Rust
        uses: dtolnay/rust-toolchain@stable

      - name: Cache cargo
        uses: Swatinem/rust-cache@v2

      - name: Install Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.x"

      - name: Show Rust version
        run: |
          rustc --version
          cargo --version

      - name: Validate Cargo.lock policy (release deterministic mode)
        shell: bash
        run: |
          set -euo pipefail
          if ! cargo metadata --locked --format-version 1 >/dev/null; then
            echo "::error::Cargo.lock is out of sync with Cargo.toml/Cargo.toml workspace metadata."
            echo "::error::Release builds require a committed, up-to-date lockfile and do not allow silent lockfile mutation."
            echo "::error::Run 'cargo generate-lockfile' (or 'cargo update' when intentional), commit Cargo.lock, and rerun release."
            exit 1
          fi

      - name: Verify standalone miner crate build surface
        run: cargo check --locked -p pulsedag-miner

      - name: Build node and standalone miner
        run: cargo build --locked --release --bin pulsedagd --bin pulsedag-miner

      - name: Package release assets (node + standalone miner)
        shell: bash
        run: |
          set -euo pipefail
          mkdir -p dist

          is_windows="false"
          if [ "${{ runner.os }}" = "Windows" ]; then
            is_windows="true"
          fi

          if [ "${is_windows}" = "true" ]; then
            node_binary="target/release/pulsedagd.exe"
            miner_binary="target/release/pulsedag-miner.exe"
          else
            node_binary="target/release/pulsedagd"
            miner_binary="target/release/pulsedag-miner"
          fi

          python scripts/release/package_release_artifacts.py \
            --binary "${node_binary}" \
            --output-dir dist \
            --tag "${{ env.RELEASE_TAG }}" \
            --bin-name "pulsedagd" \
            --repository "${{ github.repository }}" \
            --commit "${{ github.sha }}" \
            --run-id "${{ github.run_id }}" \
            --run-attempt "${{ github.run_attempt }}"

          python scripts/release/package_release_artifacts.py \
            --binary "${miner_binary}" \
            --output-dir dist \
            --tag "${{ env.RELEASE_TAG }}" \
            --bin-name "pulsedag-miner" \
            --repository "${{ github.repository }}" \
            --commit "${{ github.sha }}" \
            --run-id "${{ github.run_id }}" \
            --run-attempt "${{ github.run_attempt }}"

      - name: Verify packaged standalone miner assets (unpack + smoke)
        shell: bash
        run: |
          set -euo pipefail
          python scripts/release/verify_release_artifacts.py \
            --artifacts-dir dist \
            --expected-tag "${{ env.RELEASE_TAG }}" \
            --smoke \
            --expect-binaries pulsedag-miner \
            --expect-targets "${{ matrix.expected_target }}"

      - name: Verify packaged node+miner assets end-to-end (unpack + smoke)
        shell: bash
        run: |
          set -euo pipefail
          python scripts/release/verify_release_artifacts.py \
            --artifacts-dir dist \
            --expected-tag "${{ env.RELEASE_TAG }}" \
            --smoke \
            --expect-binaries pulsedagd pulsedag-miner \
            --expect-targets "${{ matrix.expected_target }}"

      - name: Attest release archives
        uses: actions/attest-build-provenance@v2
        with:
          subject-path: |
            dist/*.tar.gz
            dist/*.zip

      - name: Upload artifact bundle
        uses: actions/upload-artifact@v6
        with:
          name: ${{ matrix.name }}
          retention-days: 14
          path: |
            dist/*.tar.gz
            dist/*.zip
            dist/*.sha256
            dist/*.json
          if-no-files-found: error

  publish:
    name: Publish Release
    needs: build
    runs-on: ubuntu-latest
    permissions:
      contents: write

    steps:
      - name: Checkout (required for gh release create context)
        uses: actions/checkout@v4

      - name: Install Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.x"

      - name: Download artifacts
        uses: actions/download-artifact@v6
        with:
          path: artifacts

      - name: Flatten files
        shell: bash
        run: |
          set -euo pipefail
          mkdir -p final
          find artifacts -type f -exec cp "{}" final/ \;
          duplicate_names=$(find artifacts -type f -printf '%f\n' | sort | uniq -d)
          if [ -n "${duplicate_names}" ]; then
            echo "::error::Duplicate artifact filenames detected across matrix builds:"
            echo "${duplicate_names}"
            exit 1
          fi
          ls -lah final

      - name: Validate and build consolidated checksums
        shell: bash
        run: |
          set -euo pipefail
          shopt -s nullglob

          release_files=(final/*.tar.gz final/*.zip)
          checksum_files=(final/*.sha256)
          manifest_files=(final/*.json)

          if [ "${#release_files[@]}" -eq 0 ]; then
            echo "::error::No release archives found in ./final."
            exit 1
          fi

          if [ "${#checksum_files[@]}" -eq 0 ]; then
            echo "::error::No per-asset checksum files found in ./final."
            exit 1
          fi

          if [ "${#manifest_files[@]}" -eq 0 ]; then
            echo "::error::No per-asset manifest files found in ./final."
            exit 1
          fi

          for checksum in "${checksum_files[@]}"; do
            (cd final && sha256sum -c "$(basename "$checksum")")
          done

          {
            printf "# Consolidated checksums for %s\n" "${{ env.RELEASE_TAG }}"
            for file in "${release_files[@]}"; do
              (cd final && sha256sum "$(basename "$file")")
            done
          } > final/SHA256SUMS.txt

          python - <<'PY'
          import glob
          import json
          from pathlib import Path

          manifests = []
          for path in sorted(glob.glob("final/*.json")):
              with open(path, "r", encoding="utf-8") as handle:
                  manifests.append(json.load(handle))

          out = {
              "release_tag": "${{ env.RELEASE_TAG }}",
              "artifacts": manifests,
          }
          Path("final/release-provenance.json").write_text(
              json.dumps(out, indent=2, sort_keys=True) + "\n",
              encoding="utf-8",
          )
          PY

          echo "Release artifacts found:"
          for file in "${release_files[@]}"; do
            printf ' - %s\n' "$(basename "$file")"
          done
          echo "Consolidated checksums: SHA256SUMS.txt"
          echo "Release provenance summary: release-provenance.json"

      - name: Generate install verification guide
        shell: bash
        run: |
          set -euo pipefail
          python scripts/release/render_install_guide.py \
            --artifacts-dir final \
            --expected-tag "${{ env.RELEASE_TAG }}" \
            --output final/INSTALL-VERIFY.md

      - name: Verify final release bundle end-to-end
        shell: bash
        run: |
          set -euo pipefail
          python scripts/release/verify_release_artifacts.py \
            --artifacts-dir final \
            --expected-tag "${{ env.RELEASE_TAG }}" \
            --smoke \
            --expect-binaries pulsedagd pulsedag-miner \
            --expect-targets x86_64-unknown-linux-gnu x86_64-pc-windows-msvc x86_64-apple-darwin \
            --consolidated-checksums final/SHA256SUMS.txt \
            --provenance-summary final/release-provenance.json

      - name: Publish to GitHub Release
        env:
          GH_TOKEN: ${{ github.token }}
          GH_REPO: ${{ github.repository }}
        working-directory: ${{ github.workspace }}
        shell: bash
        run: |
          set -euo pipefail
          shopt -s nullglob
          files=(final/*)

          if [ "${#files[@]}" -eq 0 ]; then
            echo "::error::No files available to publish from ./final."
            exit 1
          fi

          tag="${{ env.RELEASE_TAG }}"

          if gh release view "${tag}" --repo "${GH_REPO}" >/dev/null 2>&1; then
            echo "Release ${tag} already exists. Uploading assets with --clobber."
          else
            echo "Creating release ${tag}."
            if ! gh release create "${tag}" --generate-notes --repo "${GH_REPO}"; then
              if gh release view "${tag}" --repo "${GH_REPO}" >/dev/null 2>&1; then
                echo "Release ${tag} was created concurrently. Continuing with upload."
              else
                echo "::error::Failed to create release ${tag}."
                exit 1
              fi
            fi
          fi

          gh release upload "${tag}" "${files[@]}" --clobber --repo "${GH_REPO}"
