name: release-binaries

on:
  push:
    tags:
      - "v*"
  workflow_dispatch:
    inputs:
      tag:
        description: "Existing tag to publish (for example: v1.2.3)"
        required: true
        type: string

env:
  BIN_NAME: pulsedagd
  RELEASE_TAG: ${{ github.event_name == 'workflow_dispatch' && github.event.inputs.tag || github.ref_name }}

jobs:
  build:
    name: Build ${{ matrix.name }}
    runs-on: ${{ matrix.os }}

    strategy:
      fail-fast: false
      matrix:
        include:
          - name: linux
            os: ubuntu-latest
            binary_path: target/release/pulsedagd

          - name: windows
            os: windows-latest
            binary_path: target/release/pulsedagd.exe

          - name: macos
            os: macos-latest
            binary_path: target/release/pulsedagd

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Install Rust
        uses: dtolnay/rust-toolchain@stable

      - name: Cache cargo
        uses: Swatinem/rust-cache@v2

      - name: Show Rust version
        run: |
          rustc --version
          cargo --version

      - name: Build
        run: cargo build --release --locked --bin ${{ env.BIN_NAME }}

      - name: Package release assets
        shell: bash
        run: |
          set -euo pipefail
          mkdir -p dist
          python3 scripts/release/package_release_artifacts.py \
            --binary "${{ matrix.binary_path }}" \
            --output-dir dist \
            --tag "${{ env.RELEASE_TAG }}" \
            --bin-name "${{ env.BIN_NAME }}"

      - name: Upload artifact bundle
        uses: actions/upload-artifact@v6
        with:
          name: ${{ matrix.name }}
          path: |
            dist/*.tar.gz
            dist/*.zip
            dist/*.sha256
            dist/*.json
          if-no-files-found: error

  publish:
    name: Publish Release
    needs: build
    runs-on: ubuntu-latest
    permissions:
      contents: write

    steps:
      - name: Checkout (required for gh release create context)
        uses: actions/checkout@v4

      - name: Download artifacts
        uses: actions/download-artifact@v6
        with:
          path: artifacts

      - name: Flatten files
        shell: bash
        run: |
          set -euo pipefail
          mkdir -p final
          find artifacts -type f -exec cp "{}" final/ \;
          ls -lah final

      - name: Validate and build consolidated checksums
        shell: bash
        run: |
          set -euo pipefail
          shopt -s nullglob

          release_files=(final/*.tar.gz final/*.zip)
          checksum_files=(final/*.sha256)

          if [ "${#release_files[@]}" -eq 0 ]; then
            echo "::error::No release archives found in ./final."
            exit 1
          fi

          if [ "${#checksum_files[@]}" -eq 0 ]; then
            echo "::error::No per-asset checksum files found in ./final."
            exit 1
          fi

          for checksum in "${checksum_files[@]}"; do
            (cd final && sha256sum -c "$(basename "$checksum")")
          done

          {
            printf "# Consolidated checksums for %s\n" "${{ env.RELEASE_TAG }}"
            for file in "${release_files[@]}"; do
              (cd final && sha256sum "$(basename "$file")")
            done
          } > final/SHA256SUMS.txt

          echo "Release artifacts found:"
          for file in "${release_files[@]}"; do
            printf ' - %s\n' "$(basename "$file")"
          done
          echo "Consolidated checksums: SHA256SUMS.txt"

      - name: Publish to GitHub Release
        env:
          GH_TOKEN: ${{ github.token }}
          GH_REPO: ${{ github.repository }}
        working-directory: ${{ github.workspace }}
        shell: bash
        run: |
          set -euo pipefail
          shopt -s nullglob
          files=(final/*)

          if [ "${#files[@]}" -eq 0 ]; then
            echo "::error::No files available to publish from ./final."
            exit 1
          fi

          tag="${{ env.RELEASE_TAG }}"

          if gh release view "${tag}" --repo "${GH_REPO}" >/dev/null 2>&1; then
            echo "Release ${tag} already exists. Uploading assets with --clobber."
          else
            echo "Creating release ${tag}."
            if ! gh release create "${tag}" --generate-notes --repo "${GH_REPO}"; then
              if gh release view "${tag}" --repo "${GH_REPO}" >/dev/null 2>&1; then
                echo "Release ${tag} was created concurrently. Continuing with upload."
              else
                echo "::error::Failed to create release ${tag}."
                exit 1
              fi
            fi
          fi

          gh release upload "${tag}" "${files[@]}" --clobber --repo "${GH_REPO}"
