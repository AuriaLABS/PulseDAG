name: release-binaries

on:
  push:
    tags:
      - "v*"
  workflow_dispatch:
    inputs:
      tag:
        description: "Existing tag to publish (for example: v1.2.3)"
        required: true
        type: string

env:
  BIN_NAME: pulsedagd
  RELEASE_TAG: ${{ github.event_name == 'workflow_dispatch' && github.event.inputs.tag || github.ref_name }}

jobs:
  build:
    name: Build ${{ matrix.name }}
    runs-on: ${{ matrix.os }}

    strategy:
      fail-fast: false
      matrix:
        include:
          - name: linux
            os: ubuntu-latest
            output_name: pulsedagd-linux
            binary_path: target/release/pulsedagd

          - name: windows
            os: windows-latest
            output_name: pulsedagd-windows.exe
            binary_path: target/release/pulsedagd.exe

          - name: macos
            os: macos-latest
            output_name: pulsedagd-macos
            binary_path: target/release/pulsedagd

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Install Rust
        uses: dtolnay/rust-toolchain@stable

      - name: Cache cargo
        uses: Swatinem/rust-cache@v2

      - name: Show Rust version
        run: |
          rustc --version
          cargo --version

      - name: Build
        run: cargo build --release --locked --bin ${{ env.BIN_NAME }}

      - name: Pack artifact (Windows)
        if: runner.os == 'Windows'
        shell: pwsh
        run: |
          New-Item -ItemType Directory -Force dist | Out-Null
          Copy-Item "${{ matrix.binary_path }}" "dist/${{ matrix.output_name }}"

      - name: Pack artifact (Linux/macOS)
        if: runner.os != 'Windows'
        shell: bash
        run: |
          mkdir -p dist
          cp "${{ matrix.binary_path }}" "dist/${{ matrix.output_name }}"
          chmod +x "dist/${{ matrix.output_name }}"

      - name: Upload artifact
        uses: actions/upload-artifact@v5
        with:
          name: ${{ matrix.name }}
          path: dist/${{ matrix.output_name }}
          if-no-files-found: error

  publish:
    name: Publish Release
    needs: build
    runs-on: ubuntu-latest
    permissions:
      contents: write

    steps:
      - name: Checkout (required for gh release create context)
        uses: actions/checkout@v4

      - name: Download artifacts
        uses: actions/download-artifact@v5
        with:
          path: artifacts

      - name: Flatten files
        shell: bash
        run: |
          mkdir -p final
          find artifacts -type f -exec cp {} final/ \;
          ls -lah final

      - name: Publish to GitHub Release
        env:
          GH_TOKEN: ${{ github.token }}
          GH_REPO: ${{ github.repository }}
        shell: bash
        run: |
          gh release create "${{ env.RELEASE_TAG }}" final/* --generate-notes --repo "${GH_REPO}" || \
          gh release upload "${{ env.RELEASE_TAG }}" final/* --clobber --repo "${GH_REPO}"
