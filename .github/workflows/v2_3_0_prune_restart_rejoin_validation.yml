name: v2.3.0 prune restart rejoin validation

on:
  workflow_dispatch:

permissions:
  contents: read

jobs:
  prune-restart-rejoin:
    name: non-zero prune / restart / rejoin
    runs-on: ubuntu-latest
    timeout-minutes: 180
    env:
      CARGO_TERM_COLOR: always
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Install Rust
        uses: dtolnay/rust-toolchain@stable
        with:
          components: rustfmt

      - name: Cache cargo
        uses: Swatinem/rust-cache@v2

      - name: Make scripts executable
        shell: bash
        run: chmod +x scripts/*.sh

      - name: Run prune / restart / rejoin evidence gate
        shell: bash
        run: |
          set -euo pipefail
          mkdir -p ci-evidence
          bash scripts/v2_3_0_04_prune_restart_rejoin_evidence.sh 2>&1 | tee ci-evidence/prune-restart-rejoin.log

      - name: Record prune/restart/rejoin metadata
        if: ${{ always() }}
        shell: bash
        run: |
          set -euo pipefail
          mkdir -p ci-evidence
          {
            echo "gate=v2.3.0-prune-restart-rejoin"
            echo "commit=$(git rev-parse HEAD)"
            echo "branch=$(git rev-parse --abbrev-ref HEAD)"
            echo "version=$(cat VERSION 2>/dev/null || echo unknown)"
            echo "public_testnet_ready=false"
            echo "recorded_at_utc=$(date -u +%FT%TZ)"
          } > ci-evidence/prune-restart-rejoin-metadata.txt
          tar -czf ci-evidence/prune-restart-rejoin-evidence.tar.gz -C ci-evidence .
          sha256sum ci-evidence/prune-restart-rejoin-evidence.tar.gz > ci-evidence/prune-restart-rejoin-evidence.tar.gz.sha256

      - name: Upload prune/restart/rejoin evidence
        if: ${{ always() }}
        uses: actions/upload-artifact@v4
        with:
          name: v2_3_0_prune_restart_rejoin_validation
          path: ci-evidence/
          if-no-files-found: error
