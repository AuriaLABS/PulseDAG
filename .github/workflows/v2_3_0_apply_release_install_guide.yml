name: v2.3.0 apply release install guide

on:
  push:
    branches:
      - agent/v2-3-0-13-release-proposal
    paths:
      - scripts/patches/apply_v2_3_0_release_install_guide.py
      - .github/workflows/v2_3_0_apply_release_install_guide.yml

permissions:
  contents: write

jobs:
  apply-install-guide-reference:
    runs-on: ubuntu-24.04
    steps:
      - name: Checkout proposal branch
        uses: actions/checkout@v4
        with:
          ref: agent/v2-3-0-13-release-proposal
          fetch-depth: 0

      - name: Apply exact release workflow update
        shell: bash
        run: |
          set -euo pipefail
          python3 scripts/patches/apply_v2_3_0_release_install_guide.py
          git diff --check
          grep -Fq 'docs/INSTALL_BINARIES_V2_3_0.md' .github/workflows/release-binaries.yml
          if grep -Fq 'docs/INSTALL_BINARIES_V2_2_19.md' .github/workflows/release-binaries.yml; then
            echo "historical install guide is still packaged" >&2
            exit 1
          fi

      - name: Commit release workflow update
        shell: bash
        run: |
          set -euo pipefail
          git config user.name "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"
          git add .github/workflows/release-binaries.yml
          git commit -m "v2.3.0 Task 13: package the v2.3.0 install guide"
          git push origin HEAD:agent/v2-3-0-13-release-proposal
