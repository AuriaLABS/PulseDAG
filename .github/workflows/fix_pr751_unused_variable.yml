name: Fix PR 751 unused variable

on:
  pull_request:
    branches:
      - main

permissions:
  contents: write

concurrency:
  group: fix-pr751-unused-${{ github.sha }}
  cancel-in-progress: true

jobs:
  fix:
    if: github.actor != 'github-actions[bot]'
    runs-on: ubuntu-24.04
    timeout-minutes: 60
    steps:
      - name: Checkout PR branch
        uses: actions/checkout@v4
        with:
          ref: agent/fix-v2-3-0-runtime-closeout-round-4
          fetch-depth: 0

      - name: Install Rust
        uses: dtolnay/rust-toolchain@stable
        with:
          components: rustfmt, clippy

      - name: Remove exact unused variable
        run: |
          set -euo pipefail
          python3 - <<'PY'
          from pathlib import Path

          path = Path('apps/pulsedagd/src/main.rs')
          text = path.read_text()
          old = '                        let planned_request_count = requests.len() as u64;\n'
          count = text.count(old)
          if count != 1:
              raise SystemExit(f'expected exactly one unused variable declaration, found {count}')
          path.write_text(text.replace(old, '', 1))
          PY
          cargo fmt --all -- --check
          cargo clippy -p pulsedagd --all-targets --locked -- -D warnings
          git diff --check

      - name: Publish source fix
        run: |
          set -euo pipefail
          git config user.name github-actions[bot]
          git config user.email 41898282+github-actions[bot]@users.noreply.github.com
          git add apps/pulsedagd/src/main.rs
          git commit -m 'Remove unused selected request count'
          git push origin HEAD:agent/fix-v2-3-0-runtime-closeout-round-4
