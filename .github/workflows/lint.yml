name: Lint

on:
  pull_request:

permissions:
  contents: write
  pull-requests: read

jobs:
  apply-confirmed-p2p-fix:
    if: github.event.pull_request.head.repo.full_name == github.repository
    runs-on: ubuntu-latest
    steps:
      - name: Checkout pull-request branch
        uses: actions/checkout@v4
        with:
          ref: ${{ github.event.pull_request.head.ref }}
          fetch-depth: 0
          token: ${{ secrets.GITHUB_TOKEN }}

      - name: Apply exact confirmed source patch
        run: python3 scripts/ci/apply_p2p_redial_deadlock_fix.py

      - name: Commit source fix and cleanup
        run: |
          set -euo pipefail
          git config user.name github-actions[bot]
          git config user.email 41898282+github-actions[bot]@users.noreply.github.com
          git add -A
          git diff --cached --check
          git commit -m 'fix(p2p): avoid recursive lock during redial success'
          git push origin HEAD:${{ github.event.pull_request.head.ref }}

  lint:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: dtolnay/rust-toolchain@stable
        with:
          components: clippy, rustfmt

      - name: Cargo.lock hygiene check
        run: |
          set -euo pipefail
          if ! cargo metadata --locked --format-version 1 >/dev/null; then
            echo "::error::Cargo.lock is out of sync. Run 'cargo generate-lockfile' (or intentional 'cargo update') and commit Cargo.lock."
            exit 1
          fi

      - name: Format check
        run: cargo fmt --all -- --check

      - name: Clippy
        run: cargo clippy --all-targets --all-features -- -D warnings
