name: Publish validated PR 755 frontier reconciliation fix

on:
  pull_request:
    branches:
      - main

permissions:
  contents: write

jobs:
  publish:
    runs-on: ubuntu-24.04
    steps:
      - uses: actions/checkout@v4
        with:
          ref: agent/fix-selected-segment-durability-closeout
          fetch-depth: 0
      - name: Apply previously validated patch
        shell: bash
        run: |
          set -euo pipefail
          sed -i 's/^ diff --git /diff --git /' .github/patches/pr755_frontier_reconcile.patch
          git apply --check .github/patches/pr755_frontier_reconcile.patch
          git apply .github/patches/pr755_frontier_reconcile.patch
      - name: Publish validated fix
        shell: bash
        run: |
          set -euo pipefail
          git config user.name "chatgpt-codex-connector[bot]"
          git config user.email "199175422+chatgpt-codex-connector[bot]@users.noreply.github.com"
          git add apps/pulsedagd/src/main.rs crates/pulsedag-rpc/src/handlers/readiness.rs
          git commit -m "fix: reconcile DAG frontier after selected segment recovery"
          git push origin HEAD:agent/fix-selected-segment-durability-closeout
